<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReqFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --surface:#0f1623; --panel:#141d2e; --raised:#1a2438;
  --border:#1e2d47; --border2:#263550;
  --c1:#00d4ff; --c2:#7fff6b; --c3:#ffd166; --c4:#ff6b35; --c5:#c77dff;
  --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
  --r:10px; --rl:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--c1),var(--c5));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.topbar-title{font-weight:700;font-size:15px}
.topbar-sep{color:var(--border2)}
.topbar-sub{color:var(--text2);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px}
.topbar-actions{margin-left:auto;display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid transparent;white-space:nowrap;line-height:1}
.btn-primary{background:var(--c1);color:#000;border-color:var(--c1)}
.btn-primary:hover{background:#33ddff}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--raised);color:var(--text);border-color:var(--border2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-group:last-child{margin-bottom:0}
.form-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 11px;border-radius:var(--r);transition:border-color .2s;outline:none;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--c1)}
.form-textarea{resize:vertical;min-height:75px;line-height:1.5}
.form-select option{background:var(--panel)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1}
.modal-header h2{font-size:16px;font-weight:700}
.modal-body{padding:22px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 22px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--panel)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;text-align:center}
.empty-icon{font-size:36px;opacity:.25}
.empty h3{font-size:15px;font-weight:600;color:var(--text2)}
.empty p{font-size:13px;color:var(--text3);max-width:260px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;user-select:none}
.chip.on{border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.08);color:var(--c1)}
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding-left:22px}
.tab{background:transparent;border:none;cursor:pointer;padding:9px 14px;font-size:13px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;font-family:var(--sans)}
.tab.active{color:var(--c1);border-bottom-color:var(--c1)}
.err{color:var(--c4);font-size:13px;margin-bottom:14px;padding:8px 12px;background:rgba(255,107,53,.08);border-radius:8px}
.detail-field{margin-bottom:10px}
.detail-field .lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.detail-field .val{font-size:13px;color:var(--text);line-height:1.5}
.section-head{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── CONFIG ──────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://zozoihjcbmtadzlwpzoz.supabase.co';
const SUPA_KEY = 'sb_publishable_QMOQAPb1nG4Zl22oPcRYVg_lZ2m_LQH';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── CONSTANTS ───────────────────────────────────────────────────────────────
const LEVELS = ['Stakeholder','System','Subsystem','Component','Verification'];
const PREFIXES = {Stakeholder:'STK',System:'SYS',Subsystem:'SUB',Component:'CMP',Verification:'VER'};
const LEVEL_CLR = {Stakeholder:'#00d4ff',System:'#7fff6b',Subsystem:'#ffd166',Component:'#ff6b35',Verification:'#c77dff'};
const STATUSES = ['Draft','In Review','Approved','Obsolete'];
const ST_CLR = {
  'Draft':     {bg:'rgba(100,116,139,.15)',text:'#94a3b8',bd:'rgba(100,116,139,.3)'},
  'In Review': {bg:'rgba(255,209,102,.15)',text:'#ffd166',bd:'rgba(255,209,102,.3)'},
  'Approved':  {bg:'rgba(127,255,107,.15)',text:'#7fff6b',bd:'rgba(127,255,107,.3)'},
  'Obsolete':  {bg:'rgba(255,107,53,.10)', text:'#ff6b35',bd:'rgba(255,107,53,.2)'},
};
const SIL_CLR = {'SIL 4':'#ff6b35','SIL 3':'#ff6b35','SIL 2':'#ffd166','SIL 1':'#ffd166','SIL 0':'#7fff6b','N/A':'#64748b'};
const VERIFY  = ['Test','Analysis','Inspection','Demonstration'];
const SAFETY  = ['None','Low','Medium','High','Safety-Critical'];
const SILS    = ['N/A','SIL 0','SIL 1','SIL 2','SIL 3','SIL 4'];
const SAFECAT = ['Quality','Functional Safety','Security','Dependability','RAMS'];
const PHASES  = ['Concept','Development','Qualification','Production'];
const REGS    = ['EN 50126','EN 50128','EN 50129','EN 50155','ISO 22163','ISO 9001','ISO 13485','FDA 21 CFR','ESA / ECSS','DO-178C','DO-254'];
const PHASE_CLR = {Concept:'#00d4ff',Development:'#ffd166',Qualification:'#ff6b35',Production:'#7fff6b'};

// ── ICONS (inline SVG) ───────────────────────────────────────────────────────
const Icon = ({d,size=14,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d={d}/>
  </svg>
);
const IcoPlus    = ({s}) => <Icon size={s} d="M12 5v14M5 12h14"/>;
const IcoBack    = ({s}) => <Icon size={s} d="M19 12H5M12 19l-7-7 7-7"/>;
const IcoX       = ({s}) => <Icon size={s} d="M18 6L6 18M6 6l12 12"/>;
const IcoEdit    = ({s}) => <Icon size={s} d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>;
const IcoTrash   = ({s}) => <Icon size={s} d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>;
const IcoChevR   = ({s}) => <Icon size={s} d="M9 18l6-6-6-6"/>;
const IcoChevD   = ({s}) => <Icon size={s} d="M6 9l6 6 6-6"/>;
const IcoSearch  = ({s}) => <Icon size={s} d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>;
const IcoFolder  = ({s}) => <Icon size={s} d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>;
const IcoBranch  = ({s}) => <Icon size={s} d="M6 3v12M18 9a3 3 0 100-6 3 3 0 000 6zM6 21a3 3 0 100-6 3 3 0 000 6zM18 9c0 4.97-12 4.97-12 9"/>;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function Badge({children, bg, color, bd}) {
  return <span className="badge" style={{background:bg,color,border:`1px solid ${bd}`}}>{children}</span>;
}

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('loading'); // loading | projects | project
  const [project, setProject] = useState(null);

  useEffect(() => {
    db.from('projects').select('id').limit(1)
      .then(({error}) => setPage(error ? 'error' : 'projects'));
  }, []);

  if (page === 'loading') return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14}}>
      <div className="logo" style={{width:56,height:56,fontSize:18,animation:'pulse 1.5s ease-in-out infinite'}}>RF</div>
      <div style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text3)'}}>Connecting…</div>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}`}</style>
    </div>
  );

  if (page === 'error') return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div className="card" style={{maxWidth:440,textAlign:'center'}}>
        <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
        <h2 style={{marginBottom:8}}>Cannot reach database</h2>
        <p style={{color:'var(--text2)',fontSize:13}}>Check that your Supabase URL and key are correct, and that the tables have been created via the SQL Editor.</p>
      </div>
    </div>
  );

  if (page === 'project') return (
    <ProjectView project={project} onBack={() => { setProject(null); setPage('projects'); }} />
  );

  return <ProjectList onOpen={p => { setProject(p); setPage('project'); }} />;
}

// ── PROJECT LIST ──────────────────────────────────────────────────────────────
function ProjectList({ onOpen }) {
  const [projects, setProjects] = useState([]);
  const [counts, setCounts]     = useState({});
  const [loading, setLoading]   = useState(true);
  const [showNew, setShowNew]   = useState(false);

  async function load() {
    setLoading(true);
    const { data } = await db.from('projects').select('*').order('created_at',{ascending:false});
    if (data) {
      setProjects(data);
      if (data.length) {
        const ids = data.map(p=>p.id);
        const { data: rr } = await db.from('requirements').select('project_id').in('project_id',ids);
        const c = {};
        ids.forEach(id => c[id]=0);
        rr?.forEach(r => c[r.project_id]=(c[r.project_id]||0)+1);
        setCounts(c);
      }
    }
    setLoading(false);
  }

  useEffect(() => { load(); }, []);

  async function del(id, e) {
    e.stopPropagation();
    if (!confirm('Delete this project and all its requirements?')) return;
    await db.from('projects').delete().eq('id', id);
    load();
  }

  return (
    <div style={{minHeight:'100vh'}}>
      <div className="topbar">
        <div className="logo">RF</div>
        <div className="topbar-title">ReqFlow</div>
        <div className="topbar-sep">·</div>
        <div className="topbar-sub">Requirements Management</div>
        <div className="topbar-actions">
          <button className="btn btn-primary" onClick={() => setShowNew(true)}>
            <IcoPlus s={13}/> New Project
          </button>
        </div>
      </div>

      <div style={{padding:'28px 24px',maxWidth:960,margin:'0 auto'}}>
        <div style={{marginBottom:24}}>
          <h1 style={{fontSize:24,fontWeight:800,marginBottom:4}}>Projects</h1>
          <p style={{color:'var(--text2)',fontSize:13}}>Select a project to manage its requirements hierarchy</p>
        </div>

        {loading && <div className="empty"><div className="empty-icon">⏳</div><h3>Loading…</h3></div>}

        {!loading && projects.length === 0 && (
          <div className="empty">
            <div className="empty-icon">📂</div>
            <h3>No projects yet</h3>
            <p>Create your first project to start managing requirements</p>
            <button className="btn btn-primary" onClick={() => setShowNew(true)}><IcoPlus s={13}/> Create Project</button>
          </div>
        )}

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14}}>
          {projects.map(p => {
            const pc = PHASE_CLR[p.phase] || '#00d4ff';
            return (
              <div key={p.id} className="card" onClick={() => onOpen(p)}
                style={{cursor:'pointer',transition:'all .2s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.transform='translateY(-2px)'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform='none'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div style={{width:38,height:38,borderRadius:9,background:`${pc}18`,border:`1px solid ${pc}33`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <IcoFolder s={16}/>
                  </div>
                  <button className="btn btn-ghost btn-sm btn-icon" onClick={e=>del(p.id,e)} title="Delete"><IcoTrash s={12}/></button>
                </div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{p.name}</div>
                {p.description && <div style={{color:'var(--text2)',fontSize:12,marginBottom:10,lineHeight:1.5}}>{p.description.slice(0,80)}{p.description.length>80?'…':''}</div>}
                <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:8}}>
                  <Badge bg={`${pc}18`} color={pc} bd={`${pc}33`}>{p.phase}</Badge>
                  <Badge bg="var(--raised)" color="var(--text2)" bd="var(--border)">{counts[p.id]||0} reqs</Badge>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {showNew && <ProjectModal onClose={() => setShowNew(false)} onSaved={() => { setShowNew(false); load(); }} />}
    </div>
  );
}

function ProjectModal({ onClose, onSaved }) {
  const [form, setForm] = useState({name:'',description:'',phase:'Concept'});
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  async function save() {
    if (!form.name.trim()) { setErr('Name is required'); return; }
    setSaving(true);
    const { error } = await db.from('projects').insert([{name:form.name.trim(),description:form.description,phase:form.phase}]);
    setSaving(false);
    if (error) { setErr(error.message); return; }
    onSaved();
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h2>New Project</h2><button className="btn btn-ghost btn-icon" onClick={onClose}><IcoX s={15}/></button></div>
        <div className="modal-body">
          {err && <div className="err">{err}</div>}
          <div className="form-group">
            <label className="form-label">Project Name *</label>
            <input className="form-input" placeholder="e.g. Brake Control Unit v2" value={form.name} onChange={e=>set('name',e.target.value)} autoFocus/>
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <textarea className="form-textarea" placeholder="Brief scope description…" value={form.description} onChange={e=>set('description',e.target.value)}/>
          </div>
          <div className="form-group">
            <label className="form-label">Phase</label>
            <select className="form-select" value={form.phase} onChange={e=>set('phase',e.target.value)}>
              {PHASES.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Creating…':'Create Project'}</button>
        </div>
      </div>
    </div>
  );
}

// ── PROJECT VIEW ──────────────────────────────────────────────────────────────
function ProjectView({ project, onBack }) {
  const [reqs, setReqs]         = useState([]);
  const [loading, setLoading]   = useState(true);
  const [expanded, setExpanded] = useState({});
  const [selected, setSelected] = useState(null);
  const [showModal, setShowModal]= useState(false);
  const [editReq, setEditReq]   = useState(null);
  const [defParent, setDefParent]= useState(null);
  const [search, setSearch]     = useState('');
  const [lvlFilter, setLvlFilter]= useState('All');
  const [stFilter, setStFilter] = useState('All');

  const load = useCallback(async () => {
    const { data } = await db.from('requirements').select('*').eq('project_id',project.id).order('sort_order').order('created_at');
    if (data) setReqs(data);
    setLoading(false);
  }, [project.id]);

  useEffect(() => { load(); }, [load]);

  function buildTree(flat) {
    const map = {};
    flat.forEach(r => map[r.id] = {...r, children:[]});
    const roots = [];
    flat.forEach(r => {
      if (r.parent_id && map[r.parent_id]) map[r.parent_id].children.push(map[r.id]);
      else roots.push(map[r.id]);
    });
    return roots;
  }

  const filtered = reqs.filter(r => {
    const ms = !search || r.title.toLowerCase().includes(search.toLowerCase()) || r.req_id.toLowerCase().includes(search.toLowerCase());
    const ml = lvlFilter==='All' || r.level===lvlFilter;
    const mst = stFilter==='All' || r.status===stFilter;
    return ms && ml && mst;
  });

  const tree = buildTree(filtered);

  function openNew(parentId=null) { setDefParent(parentId); setEditReq(null); setShowModal(true); }
  function openEdit(req,e) { e?.stopPropagation(); setEditReq(req); setDefParent(null); setShowModal(true); }

  const stats = STATUSES.reduce((a,s) => { a[s]=reqs.filter(r=>r.status===s).length; return a; }, {});

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div className="topbar">
        <button className="btn btn-ghost btn-icon" onClick={onBack}><IcoBack s={15}/></button>
        <div className="logo">RF</div>
        <div className="topbar-title">ReqFlow</div>
        <div className="topbar-sep">·</div>
        <div className="topbar-sub">{project.name}</div>
        <div className="topbar-actions">
          <button className="btn btn-primary btn-sm" onClick={() => openNew()}><IcoPlus s={12}/> Add Requirement</button>
        </div>
      </div>

      <div style={{display:'flex',flex:1,height:'calc(100vh - 54px)',overflow:'hidden'}}>
        {/* Tree panel */}
        <div style={{width:selected?'56%':'100%',display:'flex',flexDirection:'column',borderRight:selected?'1px solid var(--border)':'none',transition:'width .2s',overflow:'hidden'}}>

          {/* Stats */}
          <div style={{padding:'10px 18px',borderBottom:'1px solid var(--border)',background:'var(--surface)',display:'flex',gap:14,flexWrap:'wrap',alignItems:'center'}}>
            {STATUSES.map(s=>(
              <div key={s} style={{display:'flex',alignItems:'center',gap:5,fontSize:12}}>
                <span style={{width:7,height:7,borderRadius:'50%',background:ST_CLR[s].text,display:'inline-block'}}/>
                <span style={{color:'var(--text2)'}}>{s}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:ST_CLR[s].text}}>{stats[s]}</span>
              </div>
            ))}
            <span style={{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>{reqs.length} total</span>
          </div>

          {/* Search + filters */}
          <div style={{padding:'10px 18px',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center'}}>
            <div style={{position:'relative',flex:1}}>
              <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',display:'flex'}}><IcoSearch s={13}/></span>
              <input className="form-input" style={{paddingLeft:30}} placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <select className="form-select" style={{width:'auto'}} value={lvlFilter} onChange={e=>setLvlFilter(e.target.value)}>
              <option value="All">All Levels</option>
              {LEVELS.map(l=><option key={l}>{l}</option>)}
            </select>
            <select className="form-select" style={{width:'auto'}} value={stFilter} onChange={e=>setStFilter(e.target.value)}>
              <option value="All">All Statuses</option>
              {STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>

          {/* Tree */}
          <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
            {loading && <div className="empty"><div className="empty-icon">⏳</div><h3>Loading…</h3></div>}
            {!loading && tree.length===0 && (
              <div className="empty">
                <div className="empty-icon">📋</div>
                <h3>{search||lvlFilter!=='All'||stFilter!=='All'?'No results':'No requirements yet'}</h3>
                <p>{search||lvlFilter!=='All'||stFilter!=='All'?'Try a different filter':'Add your first requirement'}</p>
                {!search && lvlFilter==='All' && stFilter==='All' && (
                  <button className="btn btn-primary" onClick={() => openNew()}><IcoPlus s={13}/> Add Requirement</button>
                )}
              </div>
            )}
            {tree.map(node=>(
              <TreeNode key={node.id} node={node} depth={0}
                expanded={expanded} onToggle={id=>setExpanded(e=>({...e,[id]:!e[id]}))}
                selectedId={selected?.id}
                onSelect={r=>setSelected(s=>s?.id===r.id?null:r)}
                onEdit={openEdit}
                onAddChild={openNew}
                onDeleted={()=>{setSelected(null);load();}}
              />
            ))}
          </div>
        </div>

        {/* Detail panel */}
        {selected && (
          <div style={{flex:1,overflowY:'auto',background:'var(--surface)'}}>
            <DetailPanel
              req={reqs.find(r=>r.id===selected.id)||selected}
              allReqs={reqs}
              onEdit={r=>{openEdit(r);}}
              onClose={()=>setSelected(null)}
              onDeleted={()=>{setSelected(null);load();}}
            />
          </div>
        )}
      </div>

      {showModal && (
        <ReqModal
          projectId={project.id}
          req={editReq}
          defParentId={defParent}
          allReqs={reqs}
          onClose={()=>setShowModal(false)}
          onSaved={()=>{setShowModal(false);load();}}
        />
      )}
    </div>
  );
}

// ── TREE NODE ─────────────────────────────────────────────────────────────────
function TreeNode({ node, depth, expanded, onToggle, selectedId, onSelect, onEdit, onAddChild, onDeleted }) {
  const isOpen = expanded[node.id]!==false && (expanded[node.id]||depth<2);
  const hasKids = node.children?.length>0;
  const isSel = selectedId===node.id;
  const lc = LEVEL_CLR[node.level]||'#64748b';
  const sc = ST_CLR[node.status]||ST_CLR['Draft'];

  async function del(e) {
    e.stopPropagation();
    if (!confirm('Delete this requirement?')) return;
    await db.from('requirements').delete().eq('id',node.id);
    onDeleted();
  }

  return (
    <div>
      <div
        onClick={()=>onSelect(node)}
        style={{
          display:'flex',alignItems:'center',gap:4,
          padding:`5px 16px 5px ${16+depth*18}px`,
          cursor:'pointer',
          background:isSel?'rgba(0,212,255,.06)':'transparent',
          borderLeft:isSel?'2px solid var(--c1)':'2px solid transparent',
          transition:'all .1s',
        }}
        onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background='rgba(255,255,255,.02)'}}
        onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background='transparent'}}
      >
        <div onClick={e=>{e.stopPropagation();hasKids&&onToggle(node.id)}}
          style={{width:14,height:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'var(--text3)',cursor:hasKids?'pointer':'default'}}>
          {hasKids?(isOpen?<IcoChevD s={12}/>:<IcoChevR s={12}/>):<span style={{width:12}}/>}
        </div>
        <div style={{width:7,height:7,borderRadius:'50%',background:lc,flexShrink:0,opacity:.85}}/>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:lc,opacity:.9,flexShrink:0,minWidth:68}}>{node.req_id}</span>
        <span style={{fontSize:13,fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{node.title}</span>
        <Badge bg={sc.bg} color={sc.text} bd={sc.bd}>{node.status}</Badge>
        {node.sil_level && node.sil_level!=='N/A' && (
          <Badge bg={`${SIL_CLR[node.sil_level]}18`} color={SIL_CLR[node.sil_level]} bd={`${SIL_CLR[node.sil_level]}33`}>{node.sil_level}</Badge>
        )}
        <div style={{display:'flex',gap:2,flexShrink:0,marginLeft:4}} onClick={e=>e.stopPropagation()}>
          <button className="btn btn-ghost btn-sm btn-icon" title="Add child" onClick={()=>onAddChild(node.id)} style={{opacity:.45}}><IcoPlus s={11}/></button>
          <button className="btn btn-ghost btn-sm btn-icon" title="Edit" onClick={e=>onEdit(node,e)} style={{opacity:.45}}><IcoEdit s={11}/></button>
          <button className="btn btn-ghost btn-sm btn-icon" title="Delete" onClick={del} style={{opacity:.3,color:'var(--c4)'}}>×</button>
        </div>
      </div>
      {hasKids && isOpen && node.children.map(c=>(
        <TreeNode key={c.id} node={c} depth={depth+1} expanded={expanded} onToggle={onToggle}
          selectedId={selectedId} onSelect={onSelect} onEdit={onEdit} onAddChild={onAddChild} onDeleted={onDeleted}/>
      ))}
    </div>
  );
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
function DetailPanel({ req, allReqs, onEdit, onClose, onDeleted }) {
  if (!req) return null;
  const lc = LEVEL_CLR[req.level]||'#64748b';
  const sc = ST_CLR[req.status]||ST_CLR['Draft'];
  const parent   = req.parent_id ? allReqs.find(r=>r.id===req.parent_id) : null;
  const children = allReqs.filter(r=>r.parent_id===req.id);

  async function del() {
    if (!confirm('Delete this requirement?')) return;
    await db.from('requirements').delete().eq('id',req.id);
    onDeleted();
  }

  const Sec = ({title,children:c}) => (
    <div style={{marginBottom:18}}>
      <div className="section-head">{title}</div>
      {c}
    </div>
  );
  const Fld = ({label,value}) => value?(
    <div className="detail-field">
      <div className="lbl">{label}</div>
      <div className="val">{value}</div>
    </div>
  ):null;

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'flex-start',gap:10,background:'var(--panel)',flexShrink:0}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4,flexWrap:'wrap'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:12,color:lc,fontWeight:700}}>{req.req_id}</span>
            <Badge bg={`${lc}18`} color={lc} bd={`${lc}33`}>{req.level}</Badge>
            <Badge bg={sc.bg} color={sc.text} bd={sc.bd}>{req.status}</Badge>
            {req.sil_level && req.sil_level!=='N/A' && (
              <Badge bg={`${SIL_CLR[req.sil_level]}18`} color={SIL_CLR[req.sil_level]} bd={`${SIL_CLR[req.sil_level]}33`}>{req.sil_level}</Badge>
            )}
          </div>
          <div style={{fontWeight:700,fontSize:15,lineHeight:1.3}}>{req.title}</div>
        </div>
        <div style={{display:'flex',gap:3,flexShrink:0}}>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>onEdit(req)}><IcoEdit s={12}/></button>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={del} style={{color:'var(--c4)'}}><IcoTrash s={12}/></button>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onClose}><IcoX s={12}/></button>
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:18}}>
        <Sec title="Description">
          {req.description
            ? <div style={{fontSize:13,lineHeight:1.7,background:'var(--bg)',padding:'10px 13px',borderRadius:8,border:'1px solid var(--border)',fontStyle:'italic'}}>{req.description}</div>
            : <div style={{color:'var(--text3)',fontSize:13,fontStyle:'italic'}}>No description provided.</div>}
          {req.rationale && <div style={{marginTop:8}}><div className="lbl" style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:3,fontWeight:600}}>Rationale</div><div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>{req.rationale}</div></div>}
        </Sec>

        <Sec title="Attributes">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 14px'}}>
            <Fld label="Owner" value={req.owner}/>
            <Fld label="Verification" value={req.verification_method}/>
            <Fld label="Phase" value={req.project_phase}/>
            <Fld label="Safety Class" value={req.safety_class!=='None'?req.safety_class:null}/>
            <Fld label="Source Document" value={req.source_document}/>
          </div>
        </Sec>

        {(req.sil_level!=='N/A' || (req.regulatory_body?.length>0)) && (
          <Sec title="Safety & Compliance">
            {req.sil_level && req.sil_level!=='N/A' && (
              <div style={{marginBottom:10}}>
                <div className="lbl" style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>SIL Level</div>
                <Badge bg={`${SIL_CLR[req.sil_level]}18`} color={SIL_CLR[req.sil_level]} bd={`${SIL_CLR[req.sil_level]}33`} style={{fontSize:12,padding:'4px 12px'}}>{req.sil_level}</Badge>
              </div>
            )}
            {req.regulatory_body?.length>0 && (
              <div>
                <div className="lbl" style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>Standards</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                  {req.regulatory_body.map(b=><Badge key={b} bg="rgba(199,125,255,.08)" color="var(--c5)" bd="rgba(199,125,255,.2)">{b}</Badge>)}
                </div>
              </div>
            )}
          </Sec>
        )}

        <Sec title="Hierarchy">
          {parent && (
            <div style={{marginBottom:9}}>
              <div className="lbl" style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>Parent</div>
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 11px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--border)'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:LEVEL_CLR[parent.level]||'#64748b'}}>{parent.req_id}</span>
                <span style={{fontSize:13,color:'var(--text2)'}}>{parent.title}</span>
              </div>
            </div>
          )}
          {children.length>0 && (
            <div>
              <div className="lbl" style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:5}}>Children ({children.length})</div>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {children.map(c=>(
                  <div key={c.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 11px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--border)'}}>
                    <div style={{width:6,height:6,borderRadius:'50%',background:LEVEL_CLR[c.level]||'#64748b',flexShrink:0}}/>
                    <span style={{fontFamily:'var(--mono)',fontSize:11,color:LEVEL_CLR[c.level]||'#64748b'}}>{c.req_id}</span>
                    <span style={{fontSize:13,color:'var(--text2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.title}</span>
                    <Badge bg={ST_CLR[c.status]?.bg} color={ST_CLR[c.status]?.text} bd={ST_CLR[c.status]?.bd}>{c.status}</Badge>
                  </div>
                ))}
              </div>
            </div>
          )}
          {!parent && children.length===0 && <div style={{color:'var(--text3)',fontSize:13,fontStyle:'italic'}}>No hierarchy links yet.</div>}
        </Sec>

        <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',borderTop:'1px solid var(--border)',paddingTop:10}}>
          Created {new Date(req.created_at).toLocaleString()} · Updated {new Date(req.updated_at).toLocaleString()}
        </div>
      </div>
    </div>
  );
}

// ── REQUIREMENT MODAL ─────────────────────────────────────────────────────────
function ReqModal({ projectId, req, defParentId, allReqs, onClose, onSaved }) {
  const isEdit = !!req;
  const init = {
    req_id:'', title:'', description:'', level:'System', status:'Draft',
    parent_id: defParentId||'', owner:'', verification_method:'Test',
    safety_class:'None', sil_level:'N/A', safety_category:'Quality',
    regulatory_body:[], project_phase:'Development', source_document:'', rationale:''
  };
  const [form, setForm] = useState(init);
  const [tab, setTab]   = useState('basic');
  const [saving, setSaving] = useState(false);
  const [err, setErr]   = useState('');

  useEffect(() => {
    if (req) {
      setForm({...init,...req, parent_id:req.parent_id||'', regulatory_body:req.regulatory_body||[]});
    } else {
      const prefix = PREFIXES[form.level]||'SYS';
      const n = String(allReqs.filter(r=>r.level===form.level).length+1).padStart(3,'0');
      setForm(f=>({...f,req_id:`${prefix}-${n}`}));
    }
  },[req]);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  function onLvl(level) {
    const prefix = PREFIXES[level]||level.slice(0,3).toUpperCase();
    const n = String(allReqs.filter(r=>r.level===level).length+1).padStart(3,'0');
    setForm(f=>({...f,level,req_id:`${prefix}-${n}`}));
  }

  function toggleReg(b) {
    setForm(f=>({...f,regulatory_body:f.regulatory_body.includes(b)?f.regulatory_body.filter(x=>x!==b):[...f.regulatory_body,b]}));
  }

  async function save() {
    if (!form.title.trim()) { setErr('Title is required'); return; }
    if (!form.req_id.trim()) { setErr('ID is required'); return; }
    setSaving(true); setErr('');
    const payload = {...form, project_id:projectId, parent_id:form.parent_id||null, title:form.title.trim(), req_id:form.req_id.trim()};
    const { error } = isEdit
      ? await db.from('requirements').update(payload).eq('id',req.id)
      : await db.from('requirements').insert([payload]);
    setSaving(false);
    if (error) { setErr(error.message); return; }
    onSaved();
  }

  const parents = allReqs.filter(r=>r.id!==req?.id);
  const TABS = [{id:'basic',label:'Basic'},{id:'safety',label:'Safety & Compliance'},{id:'meta',label:'Metadata'}];

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h2>{isEdit?'Edit Requirement':'New Requirement'}</h2>
          <button className="btn btn-ghost btn-icon" onClick={onClose}><IcoX s={15}/></button>
        </div>
        <div className="tab-bar">
          {TABS.map(t=><button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>
        <div className="modal-body">
          {err && <div className="err">{err}</div>}

          {tab==='basic' && <>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Level *</label>
                <select className="form-select" value={form.level} onChange={e=>onLvl(e.target.value)}>
                  {LEVELS.map(l=><option key={l}>{l}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">ID *</label>
                <input className="form-input" value={form.req_id} onChange={e=>set('req_id',e.target.value)} placeholder="SYS-001"/>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Title *</label>
              <input className="form-input" value={form.title} onChange={e=>set('title',e.target.value)} placeholder="Short descriptive title" autoFocus/>
            </div>
            <div className="form-group">
              <label className="form-label">Description (Shall Statement)</label>
              <textarea className="form-textarea" value={form.description} onChange={e=>set('description',e.target.value)} placeholder="The system shall…"/>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Status</label>
                <select className="form-select" value={form.status} onChange={e=>set('status',e.target.value)}>
                  {STATUSES.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Verification Method</label>
                <select className="form-select" value={form.verification_method} onChange={e=>set('verification_method',e.target.value)}>
                  {VERIFY.map(v=><option key={v}>{v}</option>)}
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Parent Requirement</label>
                <select className="form-select" value={form.parent_id} onChange={e=>set('parent_id',e.target.value)}>
                  <option value="">— None (root) —</option>
                  {parents.map(r=><option key={r.id} value={r.id}>{r.req_id} — {r.title.slice(0,36)}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Owner</label>
                <input className="form-input" value={form.owner} onChange={e=>set('owner',e.target.value)} placeholder="Name or role"/>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Rationale</label>
              <textarea className="form-textarea" value={form.rationale} onChange={e=>set('rationale',e.target.value)} placeholder="Why does this requirement exist?"/>
            </div>
          </>}

          {tab==='safety' && <>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Safety Class</label>
                <select className="form-select" value={form.safety_class} onChange={e=>set('safety_class',e.target.value)}>
                  {SAFETY.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">SIL Level (EN 50129)</label>
                <select className="form-select" value={form.sil_level} onChange={e=>set('sil_level',e.target.value)}>
                  {SILS.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Safety Category</label>
              <select className="form-select" value={form.safety_category} onChange={e=>set('safety_category',e.target.value)}>
                {SAFECAT.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Applicable Standards</label>
              <div className="checkbox-group" style={{marginTop:4}}>
                {REGS.map(b=>(
                  <div key={b} className={`chip ${form.regulatory_body.includes(b)?'on':''}`} onClick={()=>toggleReg(b)}>{b}</div>
                ))}
              </div>
            </div>
          </>}

          {tab==='meta' && <>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Project Phase</label>
                <select className="form-select" value={form.project_phase} onChange={e=>set('project_phase',e.target.value)}>
                  {PHASES.map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Source Document</label>
                <input className="form-input" value={form.source_document} onChange={e=>set('source_document',e.target.value)} placeholder="Customer spec, standard ref…"/>
              </div>
            </div>
          </>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Saving…':isEdit?'Save Changes':'Create Requirement'}</button>
        </div>
      </div>
    </div>
  );
}

// ── RENDER ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
