<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReqFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4fa;--surface:#fff;--panel:#fff;--raised:#eef3fb;
  --border:#dde5f0;--border2:#c8d8f0;
  --c1:#003882;--c2:#1a7a4a;--c3:#8a6a00;--c4:#b94000;--c5:#4a6aaa;
  --text:#1a2d4e;--text2:#5a7aaa;--text3:#8aaad4;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:10px;--rl:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:none;pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f0f4fa}
::-webkit-scrollbar-thumb{background:#c8d8f0;border-radius:3px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;background:#003882;border-bottom:1px solid #002a6a;position:sticky;top:0;z-index:200}
.logo{width:32px;height:32px;border-radius:8px;background:#005EB8;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.topbar-title{font-weight:700;font-size:15px}
.topbar-sep{color:rgba(255,255,255,.3)}
.topbar-sub{color:rgba(255,255,255,.7);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid transparent;white-space:nowrap;line-height:1}
.btn-primary{background:#003882;color:#fff;border-color:#003882}
.btn-primary:hover{background:#005EB8}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:#5a7aaa;border-color:#dde5f0}
.btn-ghost:hover{background:#eef3fb;color:#1a2d4e;border-color:#c8d8f0}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed}
.btn-success{background:rgba(26,122,74,.1);color:#1a7a4a;border-color:rgba(26,122,74,.3)}
.btn-success:hover{background:rgba(26,122,74,.18)}
.btn-warn{background:rgba(138,106,0,.1);color:#8a6a00;border-color:rgba(138,106,0,.3)}
.btn-warn:hover{background:rgba(138,106,0,.18)}
.btn-danger{background:rgba(185,64,0,.1);color:#b94000;border-color:rgba(185,64,0,.3)}
.btn-danger:hover{background:rgba(185,64,0,.18)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;white-space:nowrap}

/* ── CARD ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);padding:20px}

/* ── FORMS ── */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-group:last-child{margin-bottom:0}
.form-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 11px;border-radius:var(--r);transition:border-color .2s;outline:none;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#003882}
.form-input:disabled,.form-select:disabled,.form-textarea:disabled{opacity:.5;cursor:not-allowed;background:var(--raised)}
.form-textarea{resize:vertical;min-height:75px;line-height:1.5}
.form-select option{background:var(--panel)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,30,80,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
.modal-wide{max-width:780px}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1}
.modal-header h2{font-size:16px;font-weight:700}
.modal-body{padding:22px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 22px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--panel)}

/* ── MISC ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;text-align:center}
.empty-icon{font-size:36px;opacity:.25}
.empty h3{font-size:15px;font-weight:600;color:var(--text2)}
.empty p{font-size:13px;color:var(--text3);max-width:260px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;user-select:none}
.chip.on{border-color:rgba(0,56,130,.35);background:rgba(0,56,130,.08);color:#003882}
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding-left:22px}
.tab{background:transparent;border:none;cursor:pointer;padding:9px 14px;font-size:13px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;font-family:var(--sans)}
.tab.active{color:#003882;border-bottom-color:#003882}
.err{color:#b94000;font-size:13px;margin-bottom:14px;padding:8px 12px;background:rgba(185,64,0,.08);border-radius:8px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── AUTH SCREEN ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px}
.auth-logo{width:52px;height:52px;border-radius:14px;background:#003882;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:18px;font-weight:700;color:#fff;margin:0 auto 20px}
.auth-card h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
.auth-card .auth-sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:28px}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}
.auth-switch button{background:none;border:none;color:#003882;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600}

/* ── ROLE BADGE ── */
.role-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px}

/* ── NOTIFICATION BELL ── */
.notif-wrap{position:relative}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#b94000;border:2px solid var(--surface)}
.notif-panel{position:absolute;top:calc(100% + 8px);right:0;width:320px;background:var(--panel);border:1px solid var(--border2);border-radius:var(--rl);z-index:300;overflow:hidden;animation:slideUp .15s ease}
.notif-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px}
.notif-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--raised)}
.notif-item.unread{background:rgba(0,56,130,.05)}
.notif-item .ni-title{font-size:13px;font-weight:600;margin-bottom:2px}
.notif-item .ni-body{font-size:12px;color:var(--text2)}
.notif-item .ni-time{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.notif-empty{padding:24px;text-align:center;color:var(--text3);font-size:13px}

/* ── USER MENU ── */
.user-menu-wrap{position:relative}
.user-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#000;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:border-color .2s}
.user-avatar:hover{border-color:#005EB8}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:200px;background:var(--panel);border:1px solid var(--border2);border-radius:var(--r);z-index:300;overflow:hidden;animation:slideUp .15s ease}
.ud-item{padding:10px 16px;font-size:13px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px}
.ud-item:hover{background:var(--raised)}
.ud-divider{height:1px;background:var(--border)}
.ud-name{padding:12px 16px;border-bottom:1px solid var(--border)}
.ud-name .name{font-weight:700;font-size:14px}
.ud-name .role{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* ── WORKFLOW STATUS ── */
.wf-bar{display:flex;align-items:center;gap:0;margin:16px 0}
.wf-step{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--raised)}
.wf-step:first-child{border-radius:8px 0 0 8px}
.wf-step:last-child{border-radius:0 8px 8px 0}
.wf-step.active{background:rgba(0,56,130,.1);border-color:rgba(0,56,130,.3);color:#003882}
.wf-step.done{background:rgba(26,122,74,.08);border-color:rgba(26,122,74,.2);color:#1a7a4a}
.wf-step.rejected{background:rgba(185,64,0,.08);border-color:rgba(185,64,0,.2);color:#b94000}
.wf-arrow{color:var(--text3);font-size:11px;margin:0 -1px;z-index:1}

/* ── COMMENT THREAD ── */
.comment{display:flex;gap:10px;margin-bottom:12px}
.comment-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.comment-body{flex:1;background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:10px 13px}
.comment-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.comment-name{font-weight:700;font-size:13px}
.comment-time{font-size:11px;color:var(--text3);font-family:var(--mono)}
.comment-text{font-size:13px;color:var(--text);line-height:1.6}
.action-approve{border-color:rgba(26,122,74,.3)!important;background:rgba(26,122,74,.05)!important}
.action-reject{border-color:rgba(185,64,0,.3)!important;background:rgba(185,64,0,.05)!important}
.action-changes{border-color:rgba(138,106,0,.3)!important;background:rgba(138,106,0,.05)!important}

/* ── ADMIN PANEL ── */
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.admin-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:rgba(255,255,255,.02)}

/* ── QUEUE ── */
.queue-item{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.queue-item:hover{border-color:var(--border2);transform:translateY(-1px)}
.queue-item .qi-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.queue-item .qi-title{font-weight:600;font-size:14px;margin-bottom:3px}
.queue-item .qi-meta{font-size:12px;color:var(--text2)}

@media(max-width:600px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://zozoihjcbmtadzlwpzoz.supabase.co';
const SUPA_KEY = 'sb_publishable_QMOQAPb1nG4Zl22oPcRYVg_lZ2m_LQH';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const LEVELS   = ['Stakeholder','System','Subsystem','Component','Verification'];
const PREFIXES = {Stakeholder:'STK',System:'SYS',Subsystem:'SUB',Component:'CMP',Verification:'VER'};
const LEVEL_CLR= {Stakeholder:'#005EB8',System:'#1a7a4a',Subsystem:'#8a6a00',Component:'#b94000',Verification:'#4a6aaa'};
const STATUSES = ['Draft','In Review','Approved','Changes Requested','Obsolete'];
const ST_CLR   = {
  'Draft':              {bg:'rgba(138,170,212,.12)',text:'#5a7aaa',bd:'rgba(138,170,212,.28)'},
  'In Review':          {bg:'rgba(138,106,0,.1)',text:'#8a6a00',bd:'rgba(138,106,0,.28)'},
  'Approved':           {bg:'rgba(26,122,74,.1)',text:'#1a7a4a',bd:'rgba(26,122,74,.28)'},
  'Changes Requested':  {bg:'rgba(185,64,0,.1)',text:'#b94000',bd:'rgba(185,64,0,.25)'},
  'Obsolete':           {bg:'rgba(138,170,212,.08)',text:'#8aaad4',bd:'rgba(138,170,212,.18)'},
};
const SIL_CLR  = {'SIL 4':'#b94000','SIL 3':'#b94000','SIL 2':'#8a6a00','SIL 1':'#8a6a00','SIL 0':'#1a7a4a','N/A':'#8aaad4'};
const VS       = ['Not Started','In Progress','Verified','Failed'];
const VS_CLR   = {'Not Started':{bg:'rgba(138,170,212,.1)',text:'#5a7aaa',bd:'rgba(138,170,212,.25)'},'In Progress':{bg:'rgba(255,209,102,.12)',text:'#8a6a00',bd:'rgba(255,209,102,.25)'},'Verified':{bg:'rgba(127,255,107,.12)',text:'#1a7a4a',bd:'rgba(127,255,107,.25)'},'Failed':{bg:'rgba(255,107,53,.12)',text:'#b94000',bd:'rgba(255,107,53,.25)'}};
const VERIFY   = ['Test','Analysis','Inspection','Demonstration'];
const SAFETY   = ['None','Low','Medium','High','Safety-Critical'];
const SILS     = ['N/A','SIL 0','SIL 1','SIL 2','SIL 3','SIL 4'];
const SAFECAT  = ['Quality','Functional Safety','Security','Dependability','RAMS'];
const PHASES   = ['Concept','Development','Qualification','Production'];
const REQ_TYPES = ['Functional','Performance','Interface','Safety','Reliability','Maintainability','Physical','Environmental','Operational'];
const REGS_DEFAULT = ['EN 50126','EN 50128','EN 50129','EN 50155','ISO 22163','ISO 9001']; // fallback only
const ROLES    = ['Unassigned','User','Admin'];
const PROJECT_ROLES = ['Designer','Reviewer','Approver','Verifier','Admin'];
const ROLE_CLR = {Unassigned:'#8aaad4',Designer:'#005EB8',Reviewer:'#8a6a00',Approver:'#1a7a4a',Verifier:'#4a6aaa',Admin:'#b94000'};
const PHASE_CLR= {Concept:'#005EB8',Development:'#8a6a00',Qualification:'#b94000',Production:'#1a7a4a'};

// ── ICONS ─────────────────────────────────────────────────────────────────────
const Ic = ({d,s=14,c='currentColor'}) => (
  <svg width={s} height={s} viewBox={'0 0 24 24'} fill={'none'} stroke={c} strokeWidth={'2'} strokeLinecap={'round'} strokeLinejoin={'round'}>
    <path d={d}/>
  </svg>
);
const IPlus   = ({s}) => <Ic s={s} d={'M12 5v14M5 12h14'}/>;
const IBack   = ({s}) => <Ic s={s} d={'M19 12H5M12 19l-7-7 7-7'}/>;
const IX      = ({s}) => <Ic s={s} d={'M18 6L6 18M6 6l12 12'}/>;
const IEdit   = ({s}) => <Ic s={s} d={'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z'}/>;
const ITrash  = ({s}) => <Ic s={s} d={'M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6'}/>;
const IChevR  = ({s}) => <Ic s={s} d={'M9 18l6-6-6-6'}/>;
const IChevD  = ({s}) => <Ic s={s} d={'M6 9l6 6 6-6'}/>;
const ISearch = ({s}) => <Ic s={s} d={'M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z'}/>;
const IFolder = ({s}) => <Ic s={s} d={'M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z'}/>;
const IBell   = ({s}) => <Ic s={s} d={'M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0'}/>;
const ICheck  = ({s}) => <Ic s={s} d={'M20 6L9 17l-5-5'}/>;
const IMsg    = ({s}) => <Ic s={s} d={'M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z'}/>;
const IUsers  = ({s}) => <Ic s={s} d={'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75'}/>;
const IShield = ({s}) => <Ic s={s} d={'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'}/>;
const IList   = ({s}) => <Ic s={s} d={'M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01'}/>;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function Badge({children,bg,color,bd}) {
  return <span className={'badge'} style={{background:bg,color,border:`1px solid ${bd}`}}>{children}</span>;
}
function RoleBadge({role}) {
  const c = ROLE_CLR[role]||'#64748b';
  return <span className={'role-badge'} style={{background:`${c}18`,color:c,border:`1px solid ${c}33`}}>{role}</span>;
}
function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}
function avatarColor(name) {
  const colors = ['#005EB8','#1a7a4a','#8a6a00','#b94000','#4a6aaa'];
  let h = 0;
  for (let i=0; i<(name||'').length; i++) h = (h*31 + name.charCodeAt(i)) % colors.length;
  return colors[h];
}
function timeAgo(ts) {
  return new Date(ts).toLocaleString('es-ES', {timeZone:'Europe/Madrid',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(undefined);
  const [profile, setProfile] = useState(null);
  const [page, setPage]       = useState('projects');
  const [project, setProject] = useState(null);
  const [notifications, setNotifications] = useState([]);

  useEffect(() => {
    db.auth.getSession().then(({data:{session}}) => setSession(session));
    const {data:{subscription}} = db.auth.onAuthStateChange((_,s) => {
      setSession(s);
      if (!s) { setProfile(null); setPage('projects'); setProject(null); }
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (session) loadProfile();
  }, [session]);

  async function loadProfile() {
    const {data} = await db.from('profiles').select('*').eq('id', session.user.id).single();
    setProfile(data);
  }

  async function loadNotifications() {
    if (!session) return;
    const {data} = await db.from('notifications').select('*').eq('user_id', session.user.id).order('created_at',{ascending:false}).limit(20);
    setNotifications(data||[]);
  }

  useEffect(() => {
    if (session) loadNotifications();
  }, [session]);

  if (session === undefined) return <Splash text={'Loading…'}/>;
  if (!session) return <AuthScreen/>;
  if (!profile) return <Splash text={'Loading profile…'}/>;
  // Unassigned users get read-only access;

  return (
    <AppContext.Provider value={{session, profile, loadProfile, notifications, loadNotifications, isReadOnly:profile.role==='Unassigned'}}>
      {page === 'projects' && <ProjectList onOpen={p=>{setProject(p);setPage('project')}} onAdmin={()=>setPage('admin')} onQueue={()=>setPage('queue')} onOptions={()=>setPage('options')}/>}
      {page === 'project'  && <ProjectView project={project} onBack={()=>{setProject(null);setPage('projects')}}/>}
      {page === 'admin'    && profile.role==='Admin' && <AdminPanel onBack={()=>setPage('projects')}/>}
      {page === 'options'   && profile.role==='Admin' && <OptionsPage onBack={()=>setPage('projects')}/>}
      {page === 'queue'    && <ApprovalQueue onBack={()=>setPage('projects')} onOpen={p=>{setProject(p);setPage('project')}}/>}
    </AppContext.Provider>
  );
}
