// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen() {
  const [mode, setMode]     = useState('login');
  const [email, setEmail]   = useState('');
  const [pass, setPass]     = useState('');
  const [name, setName]     = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]       = useState('');
  const [msg, setMsg]       = useState('');

  async function submit() {
    setErr(''); setMsg(''); setLoading(true);
    if (mode === 'login') {
      const {error} = await db.auth.signInWithPassword({email, password:pass});
      if (error) setErr(error.message);
    } else {
      const {error} = await db.auth.signUp({email, password:pass, options:{data:{full_name:name}}});
      if (error) setErr(error.message);
      else setMsg('Account created! You can now log in.');
    }
    setLoading(false);
  }

  function onKey(e) { if (e.key==='Enter') submit(); }

  return (
    <div className={'auth-wrap'}>
      <div className={'auth-card'}>
        <div className={'auth-logo'}>RF</div>
        <h1>ReqFlow</h1>
        <div className={'auth-sub'}>{mode==='login'?'Sign in to continue':'Create your account'}</div>
        {err && <div className={'err'}>{err}</div>}
        {msg && <div style={{color:'var(--c2)',fontSize:13,marginBottom:14,padding:'8px 12px',background:'rgba(127,255,107,.08)',borderRadius:8}}>{msg}</div>}
        {mode==='register' && (
          <div className={'form-group'}>
            <label className={'form-label'}>Full Name</label>
            <input className={'form-input'} placeholder={'Your name'} value={name} onChange={e=>setName(e.target.value)} onKeyDown={onKey}/>
          </div>
        )}
        <div className={'form-group'}>
          <label className={'form-label'}>Email</label>
          <input className={'form-input'} type={'email'} placeholder={'you@company.com'} value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={onKey}/>
        </div>
        <div className={'form-group'}>
          <label className={'form-label'}>Password</label>
          <input className={'form-input'} type={'password'} placeholder={'••••••••'} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={onKey}/>
        </div>
        <button className={'btn btn-primary'} style={{width:'100%',justifyContent:'center',marginTop:8}} onClick={submit} disabled={loading}>
          {loading?'Please wait…':mode==='login'?'Sign In':'Create Account'}
        </button>
        <div className={'auth-switch'}>
          {mode==='login'?<>No account? <button onClick={()=>{setMode('register');setErr('')}}>Register</button></>
                         :<>Have an account? <button onClick={()=>{setMode('login');setErr('')}}>Sign In</button></>}
        </div>
      </div>
    </div>
  );
}

// ── TOPBAR COMPONENT ──────────────────────────────────────────────────────────
function Topbar({title, sub, actions, children}) {
  const {profile, notifications, loadNotifications} = useApp();
  const [showNotif, setShowNotif] = useState(false);
  const [showUser, setShowUser]   = useState(false);
  const unread = notifications.filter(n=>!n.read).length;
  const notifRef = useRef(null);
  const userRef  = useRef(null);

  useEffect(() => {
    function handler(e) {
      if (notifRef.current && !notifRef.current.contains(e.target)) setShowNotif(false);
      if (userRef.current && !userRef.current.contains(e.target)) setShowUser(false);
    }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  async function markAllRead() {
    await db.from('notifications').update({read:true}).eq('user_id', profile.id).eq('read', false);
    loadNotifications();
  }

  async function signOut() { await db.auth.signOut(); }

  const ac = avatarColor(profile?.full_name);

  return (
    <div className={'topbar'}>
      <div className={'logo'}>RF</div>
      <div className={'topbar-title'}>{title||'ReqFlow'}</div>
      {sub && <><div className={'topbar-sep'}>·</div><div className={'topbar-sub'}>{sub}</div></>}
      <div className={'topbar-actions'}>
        {actions}
        {children}
        {/* Notification bell */}
        <div className={'notif-wrap'} ref={notifRef}>
          <button className={'btn btn-ghost btn-icon'} onClick={()=>{setShowNotif(v=>!v);setShowUser(false);loadNotifications()}}>
            <IBell s={15}/>
          </button>
          {unread>0 && <div className={'notif-dot'}/>}
          {showNotif && (
            <div className={'notif-panel'}>
              <div className={'notif-head'}>
                <span>Notifications {unread>0&&<span style={{color:'var(--c4)',fontFamily:'var(--mono)',fontSize:11}}>({unread})</span>}</span>
                {unread>0 && <button className={'btn btn-ghost btn-sm'} onClick={markAllRead}>Mark all read</button>}
              </div>
              {notifications.length===0 && <div className={'notif-empty'}>No notifications yet</div>}
              {notifications.map(n=>(
                <div key={n.id} className={`notif-item ${n.read?'':'unread'}`} onClick={async()=>{await db.from('notifications').update({read:true}).eq('id',n.id);loadNotifications();setShowNotif(false)}}>
                  <div className={'ni-title'}>{n.title}</div>
                  <div className={'ni-body'}>{n.body}</div>
                  <div className={'ni-time'}>{timeAgo(n.created_at)}</div>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* User avatar */}
        <div className={'user-menu-wrap'} ref={userRef}>
          <div className={'user-avatar'} style={{background:ac}} onClick={()=>{setShowUser(v=>!v);setShowNotif(false)}}>
            {initials(profile?.full_name)}
          </div>
          {showUser && (
            <div className={'user-dropdown'}>
              <div className={'ud-name'}>
                <div className={'name'}>{profile?.full_name}</div>
                <div className={'role'}><RoleBadge role={profile?.role}/></div>
              </div>
              <div className={'ud-item'} onClick={signOut}><IX s={13}/> Sign Out</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── PROJECT LIST ──────────────────────────────────────────────────────────────
function ProjectList({onOpen, onAdmin, onQueue, onOptions}) {
  const {profile, isReadOnly} = useApp();
  const [projects, setProjects] = useState([]);
  const [counts, setCounts]     = useState({});
  const [loading, setLoading]   = useState(true);
  const [showNew, setShowNew]   = useState(false);

  const [myRoles, setMyRoles] = useState({});

  async function load() {
    setLoading(true);
    let projData = [];
    if (profile.role === 'Admin' || profile.role === 'Unassigned') {
      const {data} = await db.from('projects').select('*').order('created_at',{ascending:false});
      projData = data || [];
    } else {
      const {data:mem} = await db.from('project_members').select('project_id, role').eq('user_id', profile.id);
      const roles = {};
      (mem||[]).forEach(m => roles[m.project_id] = m.role);
      setMyRoles(roles);
      if (Object.keys(roles).length) {
        const {data} = await db.from('projects').select('*').in('id', Object.keys(roles)).order('created_at',{ascending:false});
        projData = data || [];
      }
    }
    setProjects(projData);
    if (projData.length) {
      const {data:mem2} = await db.from('project_members').select('project_id,role').eq('user_id',profile.id);
      const roles2={};(mem2||[]).forEach(m=>roles2[m.project_id]=m.role);
      setMyRoles(roles2);
      const ids = projData.map(p=>p.id);
      const {data:rr} = await db.from('requirements').select('project_id').in('project_id',ids);
      const c={};ids.forEach(id=>c[id]=0);
      rr?.forEach(r=>c[r.project_id]=(c[r.project_id]||0)+1);
      setCounts(c);
    }
    setLoading(false);
  }

  useEffect(()=>{load();},[]);

  async function del(id,e) {
    e.stopPropagation();
    if (!confirm('Delete this project and all its requirements?')) return;
    await db.from('projects').delete().eq('id',id);
    load();
  }

  const isAdmin = profile?.role === 'Admin';

  return (
    <div style={{minHeight:'100vh'}}>
      <Topbar actions={
        <>
          {!isReadOnly && <button className={'btn btn-ghost btn-sm'} onClick={onQueue}><IList s={13}/> My Queue</button>}
          {isAdmin && <button className={'btn btn-ghost btn-sm'} onClick={onAdmin}><IUsers s={13}/> Users</button>}
          {isAdmin && <button className={'btn btn-ghost btn-sm'} onClick={onOptions}><IShield s={13}/> Options</button>}
          {isAdmin && <button className={'btn btn-primary btn-sm'} onClick={()=>setShowNew(true)}><IPlus s={13}/> New Project</button>}
          {isReadOnly && <span style={{fontFamily:'var(--mono)',fontSize:11,padding:'4px 10px',borderRadius:6,background:'rgba(100,116,139,.15)',color:'var(--text3)',border:'1px solid rgba(100,116,139,.25)'}}>READ ONLY</span>}
        </>
      }/>
      <div style={{padding:'28px 24px',maxWidth:960,margin:'0 auto'}}>
        <div style={{marginBottom:24}}>
          <h1 style={{fontSize:24,fontWeight:800,marginBottom:4}}>Projects</h1>
          <p style={{color:'var(--text2)',fontSize:13}}>Select a project to manage its requirements</p>
        </div>
        {loading && <div className={'empty'}><div className={'empty-icon'}>⏳</div><h3>Loading…</h3></div>}
        {!loading && projects.length===0 && (
          <div className={'empty'}>
            <div className={'empty-icon'}>📂</div>
            <h3>{isAdmin ? 'No projects yet' : 'No projects assigned'}</h3>
            <p>{isAdmin ? '' : 'Ask an Admin to add you to a project'}</p>
            {isAdmin && <button className={'btn btn-primary'} onClick={()=>setShowNew(true)}><IPlus s={13}/> Create Project</button>}
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14}}>
          {projects.map(p=>{
            const pc=PHASE_CLR[p.phase]||'#005EB8';
            const myRole = myRoles[p.id];
            const rc = myRole ? (ROLE_CLR[myRole]||'#64748b') : null;
            return (
              <div key={p.id} className={'card'} onClick={()=>onOpen({...p, myProjectRole: myRole||'Admin'})} style={{cursor:'pointer',transition:'all .2s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.transform='translateY(-2px)'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform='none'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div style={{width:38,height:38,borderRadius:9,background:`${pc}18`,border:`1px solid ${pc}33`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <IFolder s={16}/>
                  </div>
                  {isAdmin && !isReadOnly && <button className={'btn btn-ghost btn-sm btn-icon'} onClick={e=>del(p.id,e)}><ITrash s={12}/></button>}
                </div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{p.name}</div>
                {p.description && <div style={{color:'var(--text2)',fontSize:12,marginBottom:10,lineHeight:1.5}}>{p.description.slice(0,80)}{p.description.length>80?'..':''}</div>}
                <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:8}}>
                  <Badge bg={`${pc}18`} color={pc} bd={`${pc}33`}>{p.phase}</Badge>
                  <Badge bg={'var(--raised)'} color={'var(--text2)'} bd={'var(--border)'}>{counts[p.id]||0} reqs</Badge>
                  {myRole && <Badge bg={`${rc}18`} color={rc} bd={`${rc}33`}>{myRole}</Badge>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {showNew && <ProjectModal onClose={()=>setShowNew(false)} onSaved={()=>{setShowNew(false);load();}}/>}
    </div>
  );
}

function ProjectModal({onClose,onSaved}) {
  const [form,setForm]=useState({name:'',description:'',phase:'Concept'});
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  async function save() {
    if (!form.name.trim()){setErr('Name required');return;}
    setSaving(true);
    const {error}=await db.from('projects').insert([{name:form.name.trim(),description:form.description,phase:form.phase}]);
    setSaving(false);
    if (error){setErr(error.message);return;}
    onSaved();
  }
  return (
    <div className={'modal-overlay'} onClick={onClose}>
      <div className={'modal'} onClick={e=>e.stopPropagation()}>
        <div className={'modal-header'}><h2>New Project</h2><button className={'btn btn-ghost btn-icon'} onClick={onClose}><IX s={15}/></button></div>
        <div className={'modal-body'}>
          {err&&<div className={'err'}>{err}</div>}
          <div className={'form-group'}><label className={'form-label'}>Name *</label><input className={'form-input'} placeholder={'e.g. Brake Control Unit'} value={form.name} onChange={e=>set('name',e.target.value)} autoFocus/></div>
          <div className={'form-group'}><label className={'form-label'}>Description</label><textarea className={'form-textarea'} value={form.description} onChange={e=>set('description',e.target.value)}/></div>
          <div className={'form-group'}><label className={'form-label'}>Phase</label><select className={'form-select'} value={form.phase} onChange={e=>set('phase',e.target.value)}>{PHASES.map(p=><option key={p}>{p}</option>)}</select></div>
        </div>
        <div className={'modal-footer'}>
          <button className={'btn btn-ghost'} onClick={onClose}>Cancel</button>
          <button className={'btn btn-primary'} onClick={save} disabled={saving}>{saving?'Creating…':'Create Project'}</button>
        </div>
      </div>
    </div>
  );
}

// ── PROJECT VIEW ──────────────────────────────────────────────────────────────
function ProjectView({project,onBack}) {
  const {profile, isReadOnly} = useApp();
  const [reqs,setReqs]         = useState([]);
  const [loading,setLoading]   = useState(true);
  const [expanded,setExpanded] = useState({});
  const [selected,setSelected] = useState(null);
  const [showModal,setShowModal]= useState(false);
  const [showMembers,setShowMembers] = useState(false);
  const [editReq,setEditReq]   = useState(null);
  const [defParent,setDefParent]= useState(null);
  const [search,setSearch]     = useState('');
  const [lvlF,setLvlF]         = useState('All');
  const [stF,setStF]           = useState('All');
  const [ownerF,setOwnerF]     = useState('');
  const [stakeholderF,setStakeholderF] = useState('');
  const [vsF,setVsF]           = useState('All');
  const [wcField,setWcField]   = useState('verification_method');
  const [wcVal,setWcVal]       = useState('');
  const [showFilters,setShowFilters] = useState(false);

  const load = useCallback(async()=>{
    const {data}=await db.from('requirements').select('*').eq('project_id',project.id).order('sort_order').order('created_at');
    if(data)setReqs(data);
    setLoading(false);
  },[project.id]);
  const myProjectRole = project.myProjectRole || (profile?.role==='Admin'?'Admin':'Designer');

  useEffect(()=>{load();},[load]);

  function buildTree(flat) {
    const map={};flat.forEach(r=>map[r.id]={...r,children:[]});
    const roots=[];
    flat.forEach(r=>{if(r.parent_id&&map[r.parent_id])map[r.parent_id].children.push(map[r.id]);else roots.push(map[r.id]);});
    return roots;
  }

  const enrichReq = r => ({...r, myProjectRole});
  const enrichedSelected = selected ? enrichReq(reqs.find(r=>r.id===selected.id)||selected) : null;
  const hasActiveFilter = search||lvlF!=='All'||stF!=='All'||ownerF||stakeholderF||vsF!=='All'||wcVal;
  const filtered=reqs.filter(r=>{
    const ms=!search||r.title.toLowerCase().includes(search.toLowerCase())||r.req_id.toLowerCase().includes(search.toLowerCase());
    const ml=lvlF==='All'||r.level===lvlF;
    const mst=stF==='All'||r.status===stF;
    const mown=!ownerF||( r.owner||'').toLowerCase().includes(ownerF.toLowerCase());
    const mstk=!stakeholderF||(r.stakeholder||'').toLowerCase().includes(stakeholderF.toLowerCase());
    const mvs=vsF==='All'||r.verification_status===vsF;
    const mwc=!wcVal||r[wcField]===wcVal||(Array.isArray(r[wcField])&&r[wcField].includes(wcVal));
    return ms&&ml&&mst&&mown&&mstk&&mvs&&mwc;
  });
  const tree=buildTree(filtered);

  const canEdit = !isReadOnly && (['Designer','Admin'].includes(myProjectRole)||profile?.role==='Admin');
  function openNew(pid=null){setDefParent(pid);setEditReq(null);setShowModal(true);}
  function openEdit(req,e){e?.stopPropagation();setEditReq({...req,myProjectRole});setDefParent(null);setShowModal(true);}

  const stats=STATUSES.reduce((a,s)=>{a[s]=reqs.filter(r=>r.status===s).length;return a;},{});

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <Topbar sub={project.name} actions={
        <>
          <button className={'btn btn-ghost btn-sm btn-icon'} onClick={onBack}><IBack s={15}/></button>
          {(myProjectRole==='Admin'||profile?.role==='Admin') && !isReadOnly && <button className={'btn btn-ghost btn-sm'} onClick={()=>setShowMembers(true)}><IUsers s={13}/> Members</button>}
          {canEdit && <button className={'btn btn-primary btn-sm'} onClick={()=>openNew()}><IPlus s={12}/> Add Requirement</button>}
        </>
      }/>
      <div style={{display:'flex',flex:1,height:'calc(100vh - 54px)',overflow:'hidden'}}>
        {/* Tree panel */}
        <div style={{width:selected?'55%':'100%',display:'flex',flexDirection:'column',borderRight:selected?'1px solid var(--border)':'none',transition:'width .2s',overflow:'hidden'}}>
          {/* Stats */}
          <div style={{padding:'9px 18px',borderBottom:'1px solid var(--border)',background:'var(--surface)',display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
            {STATUSES.filter(s=>stats[s]>0).map(s=>(
              <div key={s} style={{display:'flex',alignItems:'center',gap:5,fontSize:12}}>
                <span style={{width:6,height:6,borderRadius:'50%',background:ST_CLR[s].text,display:'inline-block'}}/>
                <span style={{color:'var(--text2)'}}>{s}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:ST_CLR[s].text}}>{stats[s]}</span>
              </div>
            ))}
            <span style={{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>{reqs.length} total</span>
          </div>
          {/* Search/filter */}
          <div style={{padding:'9px 18px',borderBottom:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:8}}>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <div style={{position:'relative',flex:1}}>
                <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',display:'flex'}}><ISearch s={13}/></span>
                <input className={'form-input'} style={{paddingLeft:30}} placeholder={'Search...'} value={search} onChange={e=>setSearch(e.target.value)}/>
              </div>
              <button className={'btn btn-sm'} style={{flexShrink:0,background:showFilters||hasActiveFilter?'var(--c1)':'var(--raised)',color:showFilters||hasActiveFilter?'#000':'var(--text2)',border:'1px solid '+(showFilters||hasActiveFilter?'var(--c1)':'var(--border)'),position:'relative'}} onClick={()=>setShowFilters(f=>!f)}>
                <IList s={13}/> Filters
                {hasActiveFilter&&<span style={{position:'absolute',top:-4,right:-4,width:8,height:8,borderRadius:'50%',background:'var(--c4)'}}/>}
              </button>
            </div>
            {showFilters&&(
              <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',marginTop:2}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:'10px 12px',alignItems:'end'}}>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Level</div>
                    <select className={'form-select'} value={lvlF} onChange={e=>setLvlF(e.target.value)}>
                      <option value={'All'}>All levels</option>{LEVELS.map(l=><option key={l}>{l}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Status</div>
                    <select className={'form-select'} value={stF} onChange={e=>setStF(e.target.value)}>
                      <option value={'All'}>All statuses</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Stakeholder</div>
                    <input className={'form-input'} placeholder={'Search...'} value={stakeholderF} onChange={e=>setStakeholderF(e.target.value)}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Owner</div>
                    <input className={'form-input'} placeholder={'Search...'} value={ownerF} onChange={e=>setOwnerF(e.target.value)}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Activity Status</div>
                    <select className={'form-select'} value={vsF} onChange={e=>setVsF(e.target.value)}>
                      <option value={'All'}>All</option>{VS.map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                  <div style={{gridColumn:'span 2'}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>More filters</div>
                    <div style={{display:'flex',gap:6}}>
                      <select className={'form-select'} style={{flex:'0 0 auto'}} value={wcField} onChange={e=>{setWcField(e.target.value);setWcVal('');}}>
                        <option value={'verification_method'}>Verif. Method</option>
                        <option value={'requirement_type'}>Type</option>
                        <option value={'safety_class'}>Safety Class</option>
                        <option value={'sil_level'}>SIL Level</option>
                        <option value={'safety_category'}>Safety Category</option>
                        <option value={'source_document'}>Source Doc</option>
                        <option value={'regulatory_body'}>Standard</option>
                      </select>
                      <select className={'form-select'} style={{flex:1,minWidth:0}} value={wcVal} onChange={e=>setWcVal(e.target.value)}>
                        <option value={''}>All</option>
                        {[...new Set(reqs.map(r=>r[wcField]).flat().filter(Boolean))].sort().map(v=><option key={v} value={v}>{v}</option>)}
                      </select>
                    </div>
                  </div>
                </div>
                {hasActiveFilter&&(
                  <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end'}}>
                    <button className={'btn btn-ghost btn-sm'} onClick={()=>{setSearch('');setLvlF('All');setStF('All');setOwnerF('');setStakeholderF('');setVsF('All');setWcVal('');}}>Clear all filters</button>
                  </div>
                )}
              </div>
            )}
          </div>
          {/* Tree */}
          <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
            {loading&&<div className={'empty'}><div className={'empty-icon'}>⏳</div><h3>Loading…</h3></div>}
            {!loading&&tree.length===0&&(
              <div className={'empty'}>
                <div className={'empty-icon'}>📋</div>
                <h3>{hasActiveFilter?'No results':'No requirements yet'}</h3>
                {canEdit&&!hasActiveFilter&&<button className={'btn btn-primary'} onClick={()=>openNew()}><IPlus s={13}/> Add Requirement</button>}
              </div>
            )}
            {tree.map(n=><TreeNode key={n.id} node={n} depth={0} expanded={expanded} onToggle={id=>setExpanded(e=>({...e,[id]:!e[id]}))} selectedId={selected?.id} onSelect={r=>setSelected(s=>s?.id===r.id?null:r)} onEdit={openEdit} onAddChild={openNew} onDeleted={()=>{setSelected(null);load();}} canEdit={canEdit}/>)}
          </div>
        </div>
        {/* Detail panel */}
        {enrichedSelected && (
          <div style={{flex:1,overflowY:'auto',background:'var(--surface)'}}>
            <DetailPanel req={enrichedSelected} allReqs={reqs} onEdit={openEdit} onClose={()=>setSelected(null)} onDeleted={()=>{setSelected(null);load();}} onStatusChanged={load}/>
          </div>
        )}
      </div>
      {showModal&&<ReqModal projectId={project.id} req={editReq} defParentId={defParent} allReqs={reqs} onClose={()=>setShowModal(false)} onSaved={()=>{setShowModal(false);load();}}/> }
      {showMembers&&<MembersModal projectId={project.id} onClose={()=>setShowMembers(false)}/>}
    </div>
  );
}

// ── TREE NODE ─────────────────────────────────────────────────────────────────
function TreeNode({node,depth,expanded,onToggle,selectedId,onSelect,onEdit,onAddChild,onDeleted,canEdit}) {
  const isOpen=expanded[node.id]!==false&&(expanded[node.id]||depth<2);
  const hasKids=node.children?.length>0;
  const isSel=selectedId===node.id;
  const lc=LEVEL_CLR[node.level]||'#64748b';
  const sc=ST_CLR[node.status]||ST_CLR['Draft'];
  async function del(e){e.stopPropagation();if(!confirm('Delete?'))return;await db.from('requirements').delete().eq('id',node.id);onDeleted();}
  return (
    <div>
      <div onClick={()=>onSelect(node)} style={{display:'flex',alignItems:'center',gap:4,padding:`5px 16px 5px ${16+depth*18}px`,cursor:'pointer',background:isSel?'rgba(0,212,255,.06)':'transparent',borderLeft:isSel?'2px solid var(--c1)':'2px solid transparent',transition:'all .1s'}}
        onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background='rgba(255,255,255,.02)'}}
        onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background='transparent'}}>
        <div onClick={e=>{e.stopPropagation();hasKids&&onToggle(node.id)}} style={{width:14,height:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'var(--text3)',cursor:hasKids?'pointer':'default'}}>
          {hasKids?(isOpen?<IChevD s={12}/>:<IChevR s={12}/>):<span style={{width:12}}/>}
        </div>
        <div style={{width:7,height:7,borderRadius:'50%',background:lc,flexShrink:0,opacity:.85}}/>
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:lc,opacity:.9,flexShrink:0,minWidth:68}}>{node.req_id}</span>
        <span style={{fontSize:13,fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{node.title}</span>
        <Badge bg={sc.bg} color={sc.text} bd={sc.bd}>{node.status}</Badge>
        {node.sil_level&&node.sil_level!=='N/A'&&<Badge bg={`${SIL_CLR[node.sil_level]}18`} color={SIL_CLR[node.sil_level]} bd={`${SIL_CLR[node.sil_level]}33`}>{node.sil_level}</Badge>}
        {(()=>{const vs2=node.verification_status||'Not Started';const vc=VS_CLR[vs2];return vs2!=='Not Started'?<Badge bg={vc.bg} color={vc.text} bd={vc.bd}>{vs2}</Badge>:null;})()}
        {canEdit&&<div style={{display:'flex',gap:2,flexShrink:0,marginLeft:4}} onClick={e=>e.stopPropagation()}>
          <button className={'btn btn-ghost btn-sm btn-icon'} title={'Add child'} onClick={()=>onAddChild(node.id)} style={{opacity:.4}}><IPlus s={11}/></button>
          <button className={'btn btn-ghost btn-sm btn-icon'} title={'Edit'} onClick={e=>onEdit(node,e)} style={{opacity:.4}}><IEdit s={11}/></button>
          <button className={'btn btn-ghost btn-sm btn-icon'} title={'Delete'} onClick={del} style={{opacity:.3,color:'var(--c4)'}}>×</button>
        </div>}
      </div>
      {hasKids&&isOpen&&node.children.map(c=><TreeNode key={c.id} node={c} depth={depth+1} expanded={expanded} onToggle={onToggle} selectedId={selectedId} onSelect={onSelect} onEdit={onEdit} onAddChild={onAddChild} onDeleted={onDeleted} canEdit={canEdit}/>)}
    </div>
  );
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
function DetailPanel({req,allReqs,onEdit,onClose,onDeleted,onStatusChanged}) {
  const {profile,loadNotifications,isReadOnly} = useApp();
  const [comments,setComments]  = useState([]);
  const [profiles,setProfiles]  = useState({});
  const [assignments,setAssignments] = useState([]);
  const [allProfiles,setAllProfiles] = useState([]);
  const [comment,setComment]    = useState('');
  const [submitting,setSubmitting] = useState(false);
  const [tab,setTab]            = useState('details');
  const [evidence,setEvidence]  = useState([]);
  const [evProfiles,setEvProfiles] = useState({});

  const lc=LEVEL_CLR[req.level]||'#64748b';
  const sc=ST_CLR[req.status]||ST_CLR['Draft'];
  const parent=req.parent_id?allReqs.find(r=>r.id===req.parent_id):null;
  const children=allReqs.filter(r=>r.parent_id===req.id);

  async function loadComments() {
    const {data}=await db.from('comments').select('*').eq('requirement_id',req.id).order('created_at');
    if(data)setComments(data);
    const ids=[...new Set((data||[]).map(c=>c.author_id).filter(Boolean))];
    if(ids.length){
      const {data:pp}=await db.from('profiles').select('*').in('id',ids);
      const m={};pp?.forEach(p=>m[p.id]=p);setProfiles(m);
    }
  }

  async function loadAssignments() {
    const {data}=await db.from('approver_assignments').select('*').eq('requirement_id',req.id);
    if(data)setAssignments(data);
    const {data:pp}=await db.from('profiles').select('*').order('full_name');
    if(pp)setAllProfiles(pp);
  }

  async function loadEvidence() {
    const {data}=await db.from('evidence').select('*').eq('requirement_id',req.id).order('created_at',{ascending:false});
    if(data)setEvidence(data);
    const ids=[...new Set((data||[]).map(e=>e.added_by).filter(Boolean))];
    if(ids.length){const {data:pp}=await db.from('profiles').select('*').in('id',ids);const m={};pp?.forEach(p=>m[p.id]=p);setEvProfiles(m);}
  }
  useEffect(()=>{loadComments();loadAssignments();loadEvidence();},[req.id]);

  const pr = req.myProjectRole||'Designer';
  const isAdmin = profile?.role==='Admin';
  const isDesigner = pr==='Designer'||pr==='Admin'||isAdmin;
  const isApprover = pr==='Approver'||pr==='Admin'||isAdmin;
  const isVerifier = pr==='Verifier'||pr==='Admin'||isAdmin;
  const vs = req.verification_status||'Not Started';
  const vsc = VS_CLR[vs]||VS_CLR['Not Started'];
  const isAssignedApprover = assignments.some(a=>a.approver_id===profile?.id);
  const canApprove = isApprover && isAssignedApprover && req.status==='In Review';
  const canSubmit  = isDesigner && (req.status==='Draft'||req.status==='Changes Requested');

  async function addComment(action='Comment') {
    if (!comment.trim()&&action==='Comment') return;
    setSubmitting(true);
    const content = comment.trim()||`Status changed to: ${action==='Approve'?'Approved':action==='RequestChanges'?'Changes Requested':''}`;
    await db.from('comments').insert([{requirement_id:req.id,author_id:profile.id,role:profile.role,content,action,req_status:req.status}]);
    // Update requirement status
    let newStatus=req.status;
    if(action==='Approve') newStatus='Approved';
    if(action==='RequestChanges') newStatus='Changes Requested';
    if(action==='Submit') newStatus='In Review';
    if(newStatus!==req.status) {
      await db.from('requirements').update({status:newStatus}).eq('id',req.id);
      // Notify relevant people
      if(action==='Submit') {
        for(const a of assignments){
          await db.from('notifications').insert([{user_id:a.approver_id,title:'Review requested',body:`${profile.full_name} submitted "${req.title}" for review`,requirement_id:req.id}]);
        }
      }
      if(action==='Approve'||action==='RequestChanges') {
        await db.from('notifications').insert([{user_id:req.owner_id||profile.id,title:action==='Approve'?'Requirement approved':'Changes requested',body:`${profile.full_name} ${action==='Approve'?'approved':'requested changes on'} "${req.title}"`,requirement_id:req.id}]);
      }
      onStatusChanged();
      loadNotifications();
    }
    setComment('');
    setSubmitting(false);
    loadComments();
  }

  async function assignApprover(approverId) {
    if(assignments.some(a=>a.approver_id===approverId)){
      await db.from('approver_assignments').delete().eq('requirement_id',req.id).eq('approver_id',approverId);
    } else {
      await db.from('approver_assignments').insert([{requirement_id:req.id,approver_id:approverId,assigned_by:profile.id}]);
    }
    loadAssignments();
  }

  async function del() {
    if(!confirm('Delete this requirement?'))return;
    await db.from('requirements').delete().eq('id',req.id);
    onDeleted();
  }

  const actionColor={Comment:'var(--text3)',Submit:'var(--c3)',Approve:'var(--c2)',RequestChanges:'var(--c4)'};
  const actionLabel={Comment:'💬 Comment','Submit':'📤 Submit','Approve':'✅ Approve','RequestChanges':'🔄 Changes'};
  const approversInProject = allProfiles.filter(p=>p.role==='Approver'||p.role==='Admin');

  const TABS=[{id:'details',label:'Details'},{id:'workflow',label:'Status'},{id:'verification',label:'Verification'},{id:'comments',label:`Comments${comments.length?` (${comments.length})`:''}`}];

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{padding:'13px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'flex-start',gap:10,background:'var(--panel)',flexShrink:0}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4,flexWrap:'wrap'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:12,color:lc,fontWeight:700}}>{req.req_id}</span>
            <Badge bg={`${lc}18`} color={lc} bd={`${lc}33`}>{req.level}</Badge>
            <Badge bg={sc.bg} color={sc.text} bd={sc.bd}>{req.status}</Badge>
            {req.sil_level&&req.sil_level!=='N/A'&&<Badge bg={`${SIL_CLR[req.sil_level]}18`} color={SIL_CLR[req.sil_level]} bd={`${SIL_CLR[req.sil_level]}33`}>{req.sil_level}</Badge>}
            <Badge bg={vsc.bg} color={vsc.text} bd={vsc.bd}>{vs}</Badge>
          </div>
          <div style={{fontWeight:700,fontSize:15,lineHeight:1.3}}>{req.title}</div>
        </div>
        <div style={{display:'flex',gap:3,flexShrink:0}}>
          {isDesigner&&<button className={'btn btn-ghost btn-sm btn-icon'} onClick={()=>onEdit(req)}><IEdit s={12}/></button>}
          {isDesigner&&<button className={'btn btn-ghost btn-sm btn-icon'} onClick={del} style={{color:'var(--c4)'}}><ITrash s={12}/></button>}
          <button className={'btn btn-ghost btn-sm btn-icon'} onClick={onClose}><IX s={12}/></button>
        </div>
      </div>

      <div className={'tab-bar'} style={{paddingLeft:0,paddingRight:0}}>
        {TABS.map(t=><button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)} style={{fontSize:12,padding:'8px 16px'}}>{t.label}</button>)}
      </div>

      <div style={{flex:1,overflowY:'auto',padding:18}}>

        {/* ── DETAILS TAB ── */}
        {tab==='details'&&<>
          <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:10,paddingBottom:6,borderBottom:'1px solid var(--border)'}}>General</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 16px',marginBottom:12}}>
              <div className={'form-group'} style={{margin:0}}><label className={'form-label'}>Level</label><div style={{fontSize:13,paddingTop:2}}>{req.level||'—'}</div></div>
              <div className={'form-group'} style={{margin:0}}><label className={'form-label'}>Type</label><div style={{fontSize:13,paddingTop:2}}>{req.requirement_type||'—'}</div></div>
            </div>
            <div className={'form-group'} style={{margin:0}}>
              <label className={'form-label'}>Description</label>
              {req.description?<div style={{fontSize:13,lineHeight:1.7,fontStyle:'italic',color:'var(--text)',paddingTop:2}}>{req.description}</div>:<div style={{fontSize:13,color:'var(--text3)',fontStyle:'italic',paddingTop:2}}>No description.</div>}
            </div>
          </div>
          <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:10,paddingBottom:6,borderBottom:'1px solid var(--border)'}}>People & Status</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 16px'}}>
              <div className={'form-group'} style={{margin:0}}><label className={'form-label'}>Owner</label><div style={{fontSize:13,paddingTop:2}}>{req.owner||'—'}</div></div>
              <div className={'form-group'} style={{margin:0}}><label className={'form-label'}>Stakeholder</label><div style={{fontSize:13,paddingTop:2}}>{req.stakeholder||'—'}</div></div>
              <div className={'form-group'} style={{margin:0}}><label className={'form-label'}>Status</label><div style={{paddingTop:3}}><Badge bg={ST_CLR[req.status]?.bg} color={ST_CLR[req.status]?.text} bd={ST_CLR[req.status]?.bd}>{req.status}</Badge></div></div>
              <div className={'form-group'} style={{margin:0}}><label className={'form-label'}>Verification Activity</label><div style={{paddingTop:3}}><Badge bg={vsc.bg} color={vsc.text} bd={vsc.bd}>{vs}</Badge></div></div>
            </div>
          </div>
          <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8,paddingBottom:6,borderBottom:'1px solid var(--border)'}}>Rationale</div>
            {req.rationale?<div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>{req.rationale}</div>:<div style={{fontSize:13,color:'var(--text3)',fontStyle:'italic'}}>No rationale provided.</div>}
          </div>
          {(req.sil_level!=='N/A'||req.regulatory_body?.length>0)&&<div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:6}}>Safety & Standards</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {req.sil_level&&req.sil_level!=='N/A'&&<Badge bg={`${SIL_CLR[req.sil_level]}18`} color={SIL_CLR[req.sil_level]} bd={`${SIL_CLR[req.sil_level]}33`}>{req.sil_level}</Badge>}
              {req.regulatory_body?.map(b=><Badge key={b} bg={'rgba(199,125,255,.08)'} color={'var(--c5)'} bd={'rgba(199,125,255,.2)'}>{b}</Badge>)}
            </div>
          </div>}
          {(parent||children.length>0)&&<div>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:6}}>Hierarchy</div>
            {parent&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 11px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--border)',marginBottom:5}}>
              <span style={{fontFamily:'var(--mono)',fontSize:11,color:LEVEL_CLR[parent.level]||'#64748b'}}>{parent.req_id}</span>
              <span style={{fontSize:12,color:'var(--text2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{parent.title}</span>
              <span style={{fontSize:10,color:'var(--text3)'}}>parent</span>
            </div>}
            {children.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 11px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--border)',marginBottom:4}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:LEVEL_CLR[c.level]||'#64748b',flexShrink:0}}/>
              <span style={{fontFamily:'var(--mono)',fontSize:11,color:LEVEL_CLR[c.level]||'#64748b'}}>{c.req_id}</span>
              <span style={{fontSize:12,color:'var(--text2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.title}</span>
              <Badge bg={ST_CLR[c.status]?.bg} color={ST_CLR[c.status]?.text} bd={ST_CLR[c.status]?.bd}>{c.status}</Badge>
            </div>)}
          </div>}
          <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',borderTop:'1px solid var(--border)',paddingTop:10,marginTop:10}}>
            Created {new Date(req.created_at).toLocaleString()} · Updated {new Date(req.updated_at).toLocaleString()}
          </div>
        </>}

        {/* ── WORKFLOW TAB ── */}
        {tab==='workflow'&&<>
          {/* Status flow */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:10}}>Current Status</div>
            <div className={'wf-bar'}>
              {['Draft','In Review','Approved'].map((s,i)=>(
                <React.Fragment key={s}>
                  {i>0&&<div className={'wf-arrow'}>›</div>}
                  <div className={`wf-step ${req.status===s?'active':['Approved'].includes(req.status)&&i<2?'done':''}`}>{s}</div>
                </React.Fragment>
              ))}
              <div className={'wf-arrow'}>↕</div>
              <div className={`wf-step ${req.status==='Changes Requested'?'rejected':''}`}>Changes Requested</div>
            </div>
          </div>

          {/* Assigned approvers */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:8}}>Assigned Approvers</div>
            {assignments.length===0&&<div style={{fontSize:13,color:'var(--text3)',fontStyle:'italic',marginBottom:8}}>No approvers assigned yet.</div>}
            {assignments.map(a=>{
              const p=allProfiles.find(x=>x.id===a.approver_id);
              if(!p)return null;
              const ac=avatarColor(p.full_name);
              return(
                <div key={a.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'var(--bg)',borderRadius:8,border:'1px solid var(--border)',marginBottom:6}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:ac,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'#000',flexShrink:0}}>{initials(p.full_name)}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{p.full_name}</div>
                    <RoleBadge role={p.role}/>
                  </div>
                  {(isDesigner||profile?.role==='Admin')&&<button className={'btn btn-ghost btn-sm btn-icon'} onClick={()=>assignApprover(p.id)}><IX s={11}/></button>}
                </div>
              );
            })}
            {/* Assign approver dropdown - designers and admins */}
            {(isDesigner)&&!isReadOnly&&approversInProject.length>0&&(
              <div style={{marginTop:8}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:6}}>Assign Approver</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {approversInProject.filter(p=>!assignments.some(a=>a.approver_id===p.id)).map(p=>(
                    <button key={p.id} className={'btn btn-ghost btn-sm'} onClick={()=>assignApprover(p.id)}>
                      <IPlus s={11}/> {p.full_name}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Action buttons */}
          {!isReadOnly && <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {canSubmit&&<button className={'btn btn-warn'} onClick={()=>addComment('Submit')} disabled={submitting}>📤 Submit for Review</button>}
            {canApprove&&<>
              <button className={'btn btn-success'} onClick={()=>addComment('Approve')} disabled={submitting}>✅ Approve</button>
              <button className={'btn btn-danger'} onClick={()=>addComment('RequestChanges')} disabled={submitting}>🔄 Request Changes</button>
            </>}
            {req.status==='Approved'&&isDesigner&&<button className={'btn btn-ghost btn-sm'} onClick={async()=>{await db.from('requirements').update({status:'Draft'}).eq('id',req.id);onStatusChanged();}}>Reopen as Draft</button>}
          </div>}
        </>}

        {/* ── VERIFICATION TAB ── */}
        {tab==='verification'&&<VerificationTab req={req} evidence={evidence} evProfiles={evProfiles} isVerifier={isVerifier} onRefresh={loadEvidence} onStatusChanged={onStatusChanged} vs={vs} vsc={vsc}/>}

        {/* ── COMMENTS TAB ── */}
        {tab==='comments'&&<>
          <div style={{marginBottom:16}}>
            {comments.length===0&&<div style={{color:'var(--text3)',fontSize:13,fontStyle:'italic',marginBottom:16}}>No comments yet.</div>}
            {comments.map(c=>{
              const p=profiles[c.author_id];
              const ac=avatarColor(p?.full_name);
              const isAction=c.action!=='Comment';
              return(
                <div key={c.id} className={`comment ${c.action==='Approve'?'action-approve':c.action==='RequestChanges'?'action-reject':c.action==='Submit'?'action-changes':''}`}>
                  <div className={'comment-avatar'} style={{background:ac,color:'#000'}}>{initials(p?.full_name)}</div>
                  <div className={'comment-body'} style={{borderColor:isAction?(c.action==='Approve'?'rgba(127,255,107,.3)':c.action==='RequestChanges'?'rgba(255,107,53,.3)':'rgba(255,209,102,.3)'):'var(--border)'}}>
                    <div className={'comment-meta'}>
                      <span className={'comment-name'}>{p?.full_name||'Unknown'}</span>
                      {p&&<RoleBadge role={p.role}/>}
                      {isAction&&<span style={{fontSize:11,fontWeight:700,color:actionColor[c.action]}}>{actionLabel[c.action]}</span>}
                      {c.req_status&&<span style={{fontFamily:'var(--mono)',fontSize:10,padding:'2px 7px',borderRadius:4,background:ST_CLR[c.req_status]?.bg,color:ST_CLR[c.req_status]?.text,border:`1px solid ${ST_CLR[c.req_status]?.bd}`}}>{c.req_status}</span>}
                      <span className={'comment-time'}>{timeAgo(c.created_at)}</span>
                      {profile?.role==='Admin'&&<button onClick={async()=>{if(!confirm('Delete this comment?'))return;await db.from('comments').delete().eq('id',c.id);loadComments();}} style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'var(--c4)',opacity:.5,padding:'0 2px',fontSize:13,lineHeight:1}} title={'Delete comment'}>×</button>}
                    </div>
                    <div className={'comment-text'}>{c.content}</div>
                  </div>
                </div>
              );
            })}
          </div>
          {/* Comment input */}
          {!isReadOnly && <div>
            <textarea className={'form-textarea'} placeholder={'Add a comment…'} value={comment} onChange={e=>setComment(e.target.value)} style={{marginBottom:8}}/>
            <button className={'btn btn-ghost btn-sm'} onClick={()=>addComment('Comment')} disabled={submitting||!comment.trim()}>
              <IMsg s={12}/> Add Comment
            </button>
          </div>}
        </>}

      </div>
    </div>
  );
}

// ── REQUIREMENT MODAL ─────────────────────────────────────────────────────────

// -- VERIFICATION TAB --
function VerificationTab({req,evidence,evProfiles,isVerifier,onRefresh,onStatusChanged,vs,vsc}) {
  const {profile, isReadOnly} = useApp();
  const [activity, setActivity]             = useState(null);
  const [loadingAct, setLoadingAct]         = useState(true);
  const [showDefineForm, setShowDefineForm] = useState(false);
  const [showPlanForm, setShowPlanForm]     = useState(false);
  const [showFinishForm, setShowFinishForm] = useState(false);
  const [showVerifyForm, setShowVerifyForm] = useState(false);
  const [pendingStatus, setPendingStatus]   = useState(null);
  const [saving, setSaving]                 = useState(false);

  const [defineForm, setDefineForm]     = useState({description:'',method:'Test',activity_document_url:''});
  const [planForm, setPlanForm]         = useState({planned_date:''});
  const [finishForm, setFinishForm]     = useState({actual_date:''});
  const [evidenceForm, setEvidenceForm] = useState({title:'',description:'',method:'Test',evidence_url:''});

  const ACT_STATUSES = ['Not Defined','Defined','Planned','In Progress','Finished'];
  const ACT_CLR = {
    'Not Defined': {bg:'rgba(100,116,139,.12)',text:'#64748b',bd:'rgba(100,116,139,.25)'},
    'Defined':     {bg:'rgba(0,212,255,.10)',  text:'#005EB8',bd:'rgba(0,212,255,.25)'},
    'Planned':     {bg:'rgba(255,209,102,.12)',text:'#8a6a00',bd:'rgba(255,209,102,.25)'},
    'In Progress': {bg:'rgba(199,125,255,.12)',text:'#4a6aaa',bd:'rgba(199,125,255,.25)'},
    'Finished':    {bg:'rgba(127,255,107,.12)',text:'#1a7a4a',bd:'rgba(127,255,107,.25)'},
  };
  const methodColor = {Test:'#005EB8',Analysis:'#4a6aaa',Inspection:'#8a6a00',Demonstration:'#1a7a4a'};

  const notApproved = req.status !== 'Approved';
  const actStatus   = activity?.activity_status || 'Not Defined';
  const actFinished = actStatus === 'Finished';
  const canAct      = isVerifier && !isReadOnly;

  function fmtDate(d) {
    if (!d) return '';
    const dt = new Date(d);
    const day = String(dt.getUTCDate()).padStart(2,'0');
    const mon = String(dt.getUTCMonth()+1).padStart(2,'0');
    const yr  = dt.getUTCFullYear();
    return `${day}/${mon}/${yr}`;
  }

  async function loadActivity() {
    setLoadingAct(true);
    const {data} = await db.from('verification_activities').select('*').eq('requirement_id',req.id).maybeSingle();
    setActivity(data||null);
    setLoadingAct(false);
  }
  React.useEffect(()=>{loadActivity();},[req.id]);

  async function saveDefine() {
    if (!defineForm.description.trim()) return;
    setSaving(true);
    const payload = {requirement_id:req.id,description:defineForm.description.trim(),method:defineForm.method,activity_document_url:defineForm.activity_document_url||null,activity_status:'Defined',created_by:profile.id,updated_by:profile.id};
    if (activity) await db.from('verification_activities').update({...payload,updated_by:profile.id}).eq('id',activity.id);
    else await db.from('verification_activities').insert([payload]);
    setSaving(false); setShowDefineForm(false); loadActivity();
  }

  async function savePlan() {
    if (!planForm.planned_date) return;
    setSaving(true);
    await db.from('verification_activities').update({planned_date:planForm.planned_date,activity_status:'Planned',updated_by:profile.id}).eq('id',activity.id);
    setSaving(false); setShowPlanForm(false); loadActivity();
  }

  async function markInProgress() {
    if (!confirm('Mark this verification activity as In Progress?')) return;
    setSaving(true);
    await db.from('verification_activities').update({activity_status:'In Progress',updated_by:profile.id}).eq('id',activity.id);
    setSaving(false); loadActivity();
  }

  async function saveFinish() {
    setSaving(true);
    await db.from('verification_activities').update({actual_date:finishForm.actual_date||null,activity_status:'Finished',updated_by:profile.id}).eq('id',activity.id);
    setSaving(false); setShowFinishForm(false); loadActivity();
  }

  async function submitVerification() {
    if (!evidenceForm.title.trim()) return;
    setSaving(true);
    await db.from('evidence').insert([{requirement_id:req.id,added_by:profile.id,title:evidenceForm.title.trim(),description:evidenceForm.description,method:evidenceForm.method,evidence_url:evidenceForm.evidence_url||null}]);
    await db.from('requirements').update({verification_status:pendingStatus}).eq('id',req.id);
    setEvidenceForm({title:'',description:'',method:'Test',evidence_url:''});
    setShowVerifyForm(false); setPendingStatus(null); setSaving(false);
    onRefresh(); if(onStatusChanged) onStatusChanged();
  }

  async function delEvidence(id) {
    if (!confirm('Delete this evidence entry?')) return;
    await db.from('evidence').delete().eq('id',id);
    onRefresh();
  }

  const ac = ACT_CLR[actStatus];
  const stepIdx = ACT_STATUSES.indexOf(actStatus);

  return (
    <div>
      {/* ── ACTIVITY SECTION ── */}
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4}}>Verification Activity</div>
          <span style={{fontFamily:'var(--mono)',fontSize:10,padding:'3px 9px',borderRadius:5,background:ac.bg,color:ac.text,border:`1px solid ${ac.bd}`}}>{actStatus}</span>
        </div>

        {/* Progress bar */}
        <div style={{display:'flex',alignItems:'flex-start',gap:0,marginBottom:16}}>
          {ACT_STATUSES.map((s,i)=>{
            const done=i<stepIdx; const active=i===stepIdx;
            const sc=ACT_CLR[s];
            return(
              <React.Fragment key={s}>
                {i>0&&<div style={{flex:1,height:2,background:done?'var(--c2)':'var(--border)',marginTop:5,transition:'background .3s'}}/>}
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,minWidth:0}}>
                  <div style={{width:12,height:12,borderRadius:'50%',background:active?sc.text:done?'var(--c2)':'var(--border)',border:`2px solid ${active?sc.text:done?'var(--c2)':'var(--border)'}`,flexShrink:0}}/>
                  <div style={{fontSize:9,fontFamily:'var(--mono)',color:active?sc.text:done?'var(--c2)':'var(--text3)',textAlign:'center',whiteSpace:'nowrap'}}>{s}</div>
                </div>
              </React.Fragment>
            );
          })}
        </div>

        {/* Requirement not approved warning */}
        {notApproved && (
          <div style={{padding:'10px 14px',borderRadius:8,background:'rgba(255,209,102,.08)',border:'1px solid rgba(255,209,102,.2)',fontSize:13,color:'var(--c3)',marginBottom:12}}>
            Verification is locked until this requirement is <strong>Approved</strong>. Current status: <strong>{req.status}</strong>.
          </div>
        )}

        {/* Completed step records */}
        {activity && actStatus !== 'Not Defined' && (
          <div style={{marginBottom:14}}>
            {/* Defined record */}
            <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:9,padding:'10px 14px',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontFamily:'var(--mono)',fontSize:10,padding:'2px 7px',borderRadius:4,background:'rgba(0,212,255,.08)',color:'var(--c1)',border:'1px solid rgba(0,212,255,.2)'}}>DEFINED</span>
                <span style={{fontFamily:'var(--mono)',fontSize:10,padding:'2px 7px',borderRadius:4,background:`${methodColor[activity.method]||'#64748b'}18`,color:methodColor[activity.method]||'#64748b',border:`1px solid ${methodColor[activity.method]||'#64748b'}33`}}>{activity.method}</span>
              </div>
              <div style={{fontSize:13,color:'var(--text)',lineHeight:1.6,marginBottom:activity.activity_document_url?6:0}}>{activity.description}</div>
              {activity.activity_document_url&&<a href={activity.activity_document_url} target={'_blank'} rel={'noopener noreferrer'} style={{fontSize:12,color:'var(--c1)',textDecoration:'none'}}>Open activity document</a>}
              {canAct&&<button className={'btn btn-ghost btn-sm'} style={{marginTop:8,opacity:.6}} onClick={()=>{setDefineForm({description:activity.description||'',method:activity.method||'Test',activity_document_url:activity.activity_document_url||''});setShowDefineForm(true);}}>Edit</button>}
            </div>

            {/* Planned record */}
            {['Planned','In Progress','Finished'].includes(actStatus)&&activity.planned_date&&(
              <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:9,padding:'10px 14px',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:10,padding:'2px 7px',borderRadius:4,background:'rgba(255,209,102,.08)',color:'var(--c3)',border:'1px solid rgba(255,209,102,.2)'}}>PLANNED</span>
                </div>
                <div style={{fontSize:13,color:'var(--text)'}}>Forecast date: <strong>{fmtDate(activity.planned_date)}</strong></div>
                {canAct&&actStatus==='Planned'&&<button className={'btn btn-ghost btn-sm'} style={{marginTop:8,opacity:.6}} onClick={()=>{setPlanForm({planned_date:activity.planned_date||''});setShowPlanForm(true);}}>Edit</button>}
              </div>
            )}

            {/* Finished record + Verified/Failed buttons */}
            {actStatus==='Finished'&&(
              <div style={{background:'rgba(127,255,107,.04)',border:'1px solid rgba(127,255,107,.2)',borderRadius:9,padding:'10px 14px',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:10,padding:'2px 7px',borderRadius:4,background:'rgba(127,255,107,.1)',color:'var(--c2)',border:'1px solid rgba(127,255,107,.2)'}}>FINISHED</span>
                </div>
                {activity.actual_date&&<div style={{fontSize:13,color:'var(--text)',marginBottom:10}}>Completed: <strong>{fmtDate(activity.actual_date)}</strong></div>}
                {!activity.actual_date&&<div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>No actual date recorded.</div>}
                {/* Verified / Failed outcome buttons */}
                {!notApproved && canAct && !showVerifyForm && (
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    <button className={'btn btn-success btn-sm'} onClick={()=>{setPendingStatus('Verified');setShowVerifyForm(true);}}>
                      + evidence &nbsp;Verified
                    </button>
                    <button className={'btn btn-danger btn-sm'} onClick={()=>{setPendingStatus('Failed');setShowVerifyForm(true);}}>
                      + reason &nbsp;Failed
                    </button>
                    {(vs==='Verified'||vs==='Failed')&&<span style={{fontSize:12,color:vs==='Verified'?'var(--c2)':'var(--c4)',alignSelf:'center',fontWeight:600}}>Currently: {vs}</span>}
                  </div>
                )}
                {notApproved&&<div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>Approve the requirement first to set outcome.</div>}
              </div>
            )}
          </div>
        )}

        {/* Action buttons for current step */}
        {canAct && !showDefineForm && !showPlanForm && !showFinishForm && !showVerifyForm && (
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {actStatus==='Not Defined'&&<button className={'btn btn-ghost btn-sm'} onClick={()=>setShowDefineForm(true)}>Define Activity</button>}
            {actStatus==='Defined'&&<button className={'btn btn-warn btn-sm'} onClick={()=>setShowPlanForm(true)}>Plan Activity</button>}
            {actStatus==='Planned'&&<button className={'btn btn-ghost btn-sm'} onClick={markInProgress}>Mark In Progress</button>}
            {actStatus==='In Progress'&&<button className={'btn btn-success btn-sm'} onClick={()=>setShowFinishForm(true)}>Mark Finished</button>}
            {stepIdx>0&&canAct&&<button className={'btn btn-ghost btn-sm'} style={{opacity:.6,marginLeft:4}} onClick={async()=>{if(window.confirm(`Go back to "${ACT_STATUSES[stepIdx-1]}"?`)){await db.from('verification_activities').update({activity_status:ACT_STATUSES[stepIdx-1]}).eq('requirement_id',req.id);onStatusChanged();onRefresh();}}}>&#8592; Go back</button>}
          </div>
        )}

        {/* Define form */}
        {showDefineForm&&canAct&&(
          <div style={{background:'var(--bg)',border:'2px solid rgba(0,212,255,.2)',borderRadius:10,padding:16,marginTop:8}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--c1)',marginBottom:12}}>Define Verification Activity</div>
            <div className={'form-group'}>
              <label className={'form-label'}>Activity Description *</label>
              <textarea className={'form-textarea'} style={{minHeight:70}} placeholder={'Describe how this requirement will be verified...'} value={defineForm.description} onChange={e=>setDefineForm(f=>({...f,description:e.target.value}))} autoFocus/>
            </div>
            <div className={'form-row'}>
              <div className={'form-group'}>
                <label className={'form-label'}>Method</label>
                <select className={'form-select'} value={defineForm.method} onChange={e=>setDefineForm(f=>({...f,method:e.target.value}))}>
                  {['Test','Analysis','Inspection','Demonstration'].map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div className={'form-group'}>
                <label className={'form-label'}>Activity Document (URL)</label>
                <input className={'form-input'} placeholder={'Link to test plan, procedure...'} value={defineForm.activity_document_url} onChange={e=>setDefineForm(f=>({...f,activity_document_url:e.target.value}))}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className={'btn btn-primary btn-sm'} onClick={saveDefine} disabled={saving||!defineForm.description.trim()}>{saving?'Saving...':'Save'}</button>
              <button className={'btn btn-ghost btn-sm'} onClick={()=>setShowDefineForm(false)}>Cancel</button>
            </div>
          </div>
        )}

        {/* Plan form */}
        {showPlanForm&&canAct&&(
          <div style={{background:'var(--bg)',border:'2px solid rgba(255,209,102,.2)',borderRadius:10,padding:16,marginTop:8}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--c3)',marginBottom:12}}>Plan Verification Activity</div>
            <div className={'form-group'}>
              <label className={'form-label'}>Forecast Date *</label>
              <input className={'form-input'} type={'date'} value={planForm.planned_date} onChange={e=>setPlanForm(f=>({...f,planned_date:e.target.value}))} autoFocus/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className={'btn btn-warn btn-sm'} onClick={savePlan} disabled={saving||!planForm.planned_date}>{saving?'Saving...':'Save'}</button>
              <button className={'btn btn-ghost btn-sm'} onClick={()=>setShowPlanForm(false)}>Cancel</button>
            </div>
          </div>
        )}

        {/* Finish form */}
        {showFinishForm&&canAct&&(
          <div style={{background:'var(--bg)',border:'2px solid rgba(127,255,107,.2)',borderRadius:10,padding:16,marginTop:8}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--c2)',marginBottom:12}}>Mark Activity as Finished</div>
            <div className={'form-group'}>
              <label className={'form-label'}>Actual Completion Date</label>
              <input className={'form-input'} type={'date'} value={finishForm.actual_date} onChange={e=>setFinishForm(f=>({...f,actual_date:e.target.value}))} autoFocus/>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className={'btn btn-success btn-sm'} onClick={saveFinish} disabled={saving}>{saving?'Saving...':'Mark Finished'}</button>
              <button className={'btn btn-ghost btn-sm'} onClick={()=>setShowFinishForm(false)}>Cancel</button>
            </div>
          </div>
        )}

        {/* Evidence/failure form */}
        {showVerifyForm&&canAct&&(
          <div style={{background:'var(--bg)',border:`2px solid ${pendingStatus==='Verified'?'rgba(127,255,107,.3)':'rgba(255,107,53,.3)'}`,borderRadius:12,padding:18,marginTop:8}}>
            <div style={{fontSize:13,fontWeight:700,color:pendingStatus==='Verified'?'var(--c2)':'var(--c4)',marginBottom:12}}>
              {pendingStatus==='Verified'?'Submit Verification Evidence':'Record Failure Reason'}
            </div>
            <div className={'form-group'}>
              <label className={'form-label'}>Title *</label>
              <input className={'form-input'} placeholder={pendingStatus==='Verified'?'e.g. Test report v1.2':'e.g. Threshold exceeded'} value={evidenceForm.title} onChange={e=>setEvidenceForm(f=>({...f,title:e.target.value}))} autoFocus/>
            </div>
            <div className={'form-group'}>
              <label className={'form-label'}>Description</label>
              <textarea className={'form-textarea'} style={{minHeight:70}} placeholder={'Summary of results, observations...'} value={evidenceForm.description} onChange={e=>setEvidenceForm(f=>({...f,description:e.target.value}))}/>
            </div>
            <div className={'form-row'}>
              <div className={'form-group'}>
                <label className={'form-label'}>Method</label>
                <select className={'form-select'} value={evidenceForm.method} onChange={e=>setEvidenceForm(f=>({...f,method:e.target.value}))}>
                  {['Test','Analysis','Inspection','Demonstration'].map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div className={'form-group'}>
                <label className={'form-label'}>Evidence Link (URL)</label>
                <input className={'form-input'} placeholder={'Link to report or document...'} value={evidenceForm.evidence_url} onChange={e=>setEvidenceForm(f=>({...f,evidence_url:e.target.value}))}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className={`btn ${pendingStatus==='Verified'?'btn-success':'btn-danger'}`} onClick={submitVerification} disabled={saving||!evidenceForm.title.trim()}>
                {saving?'Submitting...':pendingStatus==='Verified'?'Submit & Mark Verified':'Submit & Mark Failed'}
              </button>
              <button className={'btn btn-ghost'} onClick={()=>{setShowVerifyForm(false);setPendingStatus(null);}}>Cancel</button>
            </div>
          </div>
        )}
      </div>

      <div style={{height:1,background:'var(--border)',marginBottom:16}}/>

      {/* Evidence & failure record */}
      <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:12}}>
        Evidence & Failure Record ({evidence.length})
      </div>
      {evidence.length===0&&<div style={{color:'var(--text3)',fontSize:13,fontStyle:'italic',padding:'8px 0'}}>No evidence recorded yet.</div>}
      {evidence.map(ev=>{
        const p=evProfiles[ev.added_by]; const mc=methodColor[ev.method]||'#64748b';
        return(
          <div key={ev.id} style={{background:'var(--raised)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 14px',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:4}}>
                  <span style={{fontWeight:700,fontSize:13}}>{ev.title}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:10,padding:'2px 8px',borderRadius:4,background:`${mc}18`,color:mc,border:`1px solid ${mc}33`}}>{ev.method}</span>
                </div>
                {ev.description&&<div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:6}}>{ev.description}</div>}
                {ev.evidence_url&&<a href={ev.evidence_url} target={'_blank'} rel={'noopener noreferrer'} style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,color:'var(--c1)',textDecoration:'none'}}>Open evidence file</a>}
                <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:6}}>
                  {p?.full_name||'Unknown'} — {new Date(ev.created_at).toLocaleDateString('es-ES')}
                </div>
              </div>
              {isVerifier&&<button className={'btn btn-ghost btn-sm btn-icon'} onClick={()=>delEvidence(ev.id)} style={{color:'var(--c4)',opacity:.5,flexShrink:0}}><ITrash s={11}/></button>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// -- MEMBERS MODAL --
function MembersModal({projectId, onClose}) {
  const {profile} = useApp();
  const [members, setMembers]   = useState([]);
  const [allUsers, setAllUsers] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [addUserId, setAddUserId] = useState('');
  const [addRole, setAddRole]   = useState('Designer');
  const [saving, setSaving]     = useState(false);

  async function load() {
    setLoading(true);
    const {data:mm} = await db.from('project_members').select('*').eq('project_id', projectId);
    setMembers(mm||[]);
    const {data:uu} = await db.from('profiles').select('*').order('full_name');
    setAllUsers(uu||[]);
    setLoading(false);
  }

  useEffect(()=>{load();},[]);

  async function addMember() {
    if (!addUserId) return;
    setSaving(true);
    await db.from('project_members').upsert([{project_id:projectId, user_id:addUserId, role:addRole, added_by:profile.id}], {onConflict:'project_id,user_id'});
    setAddUserId('');
    setSaving(false);
    load();
  }

  async function changeRole(userId, role) {
    await db.from('project_members').update({role}).eq('project_id',projectId).eq('user_id',userId);
    load();
  }

  async function removeMember(userId) {
    if (!confirm('Remove this member from the project?')) return;
    await db.from('project_members').delete().eq('project_id',projectId).eq('user_id',userId);
    load();

  const memberIds = members.map(m=>m.user_id);
  const nonMembers = allUsers.filter(u=>!memberIds.includes(u.id) && u.role!=='Unassigned');

      <div className={'modal'} onClick={e=>e.stopPropagation()}>

            {memberProfiles.map(m=>{
              const ac = avatarColor(m.profile.full_name);
              const rc = ROLE_CLR[m.role]||'#64748b';
              return(
                <div key={m.user_id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:'var(--bg)',borderRadius:9,border:'1px solid var(--border)',marginBottom:7}}>
                  <div style={{width:30,height:30,borderRadius:'50%',background:ac,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'#000',flexShrink:0}}>{initials(m.profile.full_name)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{m.profile.full_name}</div>
                    <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>{m.profile.role} (global)</div>
                  </div>
                  <select className={'form-select'} style={{width:'auto',fontSize:12,padding:'4px 8px'}} value={m.role} onChange={e=>changeRole(m.user_id,e.target.value)}>
                    {PROJECT_ROLES.map(r=><option key={r}>{r}</option>)}
                  </select>
                  <button className={'btn btn-ghost btn-sm btn-icon'} onClick={()=>removeMember(m.user_id)} style={{color:'var(--c4)',opacity:.6}}><IX s={12}/></button>

            {/* Add member */}
            {nonMembers.length > 0 && <>
              <div style={{height:1,background:'var(--border)',margin:'14px 0'}}/>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:10}}>Add Member</div>
              <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                <div className={'form-group'} style={{flex:1,marginBottom:0}}>
                  <label className={'form-label'}>User</label>
                  <select className={'form-select'} value={addUserId} onChange={e=>setAddUserId(e.target.value)}>
                    <option value={''}>Select user...</option>
                    {nonMembers.map(u=><option key={u.id} value={u.id}>{u.full_name}</option>)}
                  </select>
                </div>
                <div className={'form-group'} style={{width:130,marginBottom:0}}>
                  <label className={'form-label'}>Role</label>
                  <select className={'form-select'} value={addRole} onChange={e=>setAddRole(e.target.value)}>
                    {PROJECT_ROLES.map(r=><option key={r}>{r}</option>)}
                  </select>
                </div>
                <button className={'btn btn-primary'} onClick={addMember} disabled={saving||!addUserId} style={{flexShrink:0,marginBottom:0}}><IPlus s={13}/> Add</button>
              </div>
            </>}
            {nonMembers.length===0 && allUsers.filter(u=>u.role!=='Unassigned').length>0 && (
              <div style={{fontSize:13,color:'var(--text3)',fontStyle:'italic',marginTop:12}}>All active users are already members of this project.</div>
            )}
