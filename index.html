<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReqFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#f0f4fa;--surface:#fff;--panel:#fff;--raised:#eef3fb;
  --border:#dde5f0;--border2:#c8d8f0;
  --c1:#003882;--c2:#1a7a4a;--c3:#8a6a00;--c4:#b94000;--c5:#4a6aaa;
  --text:#1a2d4e;--text2:#5a7aaa;--text3:#8aaad4;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:10px;--rl:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:none;pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f0f4fa}
::-webkit-scrollbar-thumb{background:#c8d8f0;border-radius:3px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;background:#003882;border-bottom:1px solid #002a6a;position:sticky;top:0;z-index:200;color:#fff}
.logo{width:32px;height:32px;border-radius:8px;background:#005EB8;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.topbar-title{font-weight:700;font-size:15px;color:#fff}
.topbar-sep{color:rgba(255,255,255,.5)}
.topbar-sub{color:#fff;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;font-weight:500}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.topbar .btn-ghost{color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.2);background:transparent}
.topbar .btn-ghost:hover{color:#fff;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.35)}
.user-dropdown{color:var(--text)}
.user-dropdown .ud-item{color:var(--text)}
.user-dropdown .ud-name .name{color:var(--text)}
.user-dropdown .btn-ghost{color:var(--c1);border-color:transparent;background:transparent}
.user-dropdown .btn-ghost:hover{color:var(--c1);background:var(--raised);border-color:var(--border)}
.notif-panel{color:var(--text)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid transparent;white-space:nowrap;line-height:1}
.btn-primary{background:#003882;color:#fff;border-color:#003882}
.btn-primary:hover{background:#005EB8}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:#5a7aaa;border-color:#dde5f0}
.btn-ghost:hover{background:#eef3fb;color:#1a2d4e;border-color:#c8d8f0}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed}
.btn-success{background:rgba(26,122,74,.1);color:#1a7a4a;border-color:rgba(26,122,74,.3)}
.btn-success:hover{background:rgba(26,122,74,.18)}
.btn-warn{background:rgba(138,106,0,.1);color:#8a6a00;border-color:rgba(138,106,0,.3)}
.btn-warn:hover{background:rgba(138,106,0,.18)}
.btn-danger{background:rgba(185,64,0,.1);color:#b94000;border-color:rgba(185,64,0,.3)}
.btn-danger:hover{background:rgba(185,64,0,.18)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;white-space:nowrap}

/* ── CARD ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);padding:20px}

/* ── FORMS ── */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-group:last-child{margin-bottom:0}
.form-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 11px;border-radius:var(--r);transition:border-color .2s;outline:none;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#003882}
.form-input:disabled,.form-select:disabled,.form-textarea:disabled{opacity:.5;cursor:not-allowed;background:var(--raised)}
.form-textarea{resize:vertical;min-height:75px;line-height:1.5}
.form-select option{background:var(--panel)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,30,80,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
.modal-wide{max-width:780px}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1}
.modal-header h2{font-size:16px;font-weight:700}
.modal-body{padding:22px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 22px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--panel)}

/* ── MISC ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;text-align:center}
.empty-icon{font-size:36px;opacity:.25}
.empty h3{font-size:15px;font-weight:600;color:var(--text2)}
.empty p{font-size:13px;color:var(--text3);max-width:260px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;user-select:none}
.chip.on{border-color:rgba(0,56,130,.35);background:rgba(0,56,130,.08);color:#003882}
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding-left:22px}
.tab{background:transparent;border:none;cursor:pointer;padding:9px 14px;font-size:13px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;font-family:var(--sans)}
.tab.active{color:#003882;border-bottom-color:#003882}
.err{color:#b94000;font-size:13px;margin-bottom:14px;padding:8px 12px;background:rgba(185,64,0,.08);border-radius:8px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── AUTH SCREEN ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px}
.auth-logo{width:52px;height:52px;border-radius:14px;background:#003882;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:18px;font-weight:700;color:#fff;margin:0 auto 20px}
.auth-card h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
.auth-card .auth-sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:28px}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}
.auth-switch button{background:none;border:none;color:#003882;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600}

/* ── ROLE BADGE ── */
.role-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px}

/* ── NOTIFICATION BELL ── */
.notif-wrap{position:relative}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#b94000;border:2px solid var(--surface)}
.notif-panel{position:absolute;top:calc(100% + 8px);right:0;width:320px;background:var(--panel);border:1px solid var(--border2);border-radius:var(--rl);z-index:300;overflow:hidden;animation:slideUp .15s ease}
.notif-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px}
.notif-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--raised)}
.notif-item.unread{background:rgba(0,56,130,.05)}
.notif-item .ni-title{font-size:13px;font-weight:600;margin-bottom:2px}
.notif-item .ni-body{font-size:12px;color:var(--text2)}
.notif-item .ni-time{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.notif-empty{padding:24px;text-align:center;color:var(--text3);font-size:13px}

/* ── USER MENU ── */
.user-menu-wrap{position:relative}
.user-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#000;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:border-color .2s}
.user-avatar:hover{border-color:#005EB8}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:200px;background:var(--panel);border:1px solid var(--border2);border-radius:var(--r);z-index:300;overflow:hidden;animation:slideUp .15s ease}
.ud-item{padding:10px 16px;font-size:13px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px}
.ud-item:hover{background:var(--raised)}
.ud-divider{height:1px;background:var(--border)}
.ud-name{padding:12px 16px;border-bottom:1px solid var(--border)}
.ud-name .name{font-weight:700;font-size:14px}
.ud-name .role{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* ── WORKFLOW STATUS ── */
.wf-bar{display:flex;align-items:center;gap:0;margin:16px 0}
.wf-step{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--raised)}
.wf-step:first-child{border-radius:8px 0 0 8px}
.wf-step:last-child{border-radius:0 8px 8px 0}
.wf-step.active{background:rgba(0,56,130,.1);border-color:rgba(0,56,130,.3);color:#003882}
.wf-step.done{background:rgba(26,122,74,.08);border-color:rgba(26,122,74,.2);color:#1a7a4a}
.wf-step.rejected{background:rgba(185,64,0,.08);border-color:rgba(185,64,0,.2);color:#b94000}
.wf-arrow{color:var(--text3);font-size:11px;margin:0 -1px;z-index:1}

/* ── COMMENT THREAD ── */
.comment{display:flex;gap:10px;margin-bottom:12px}
.comment-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.comment-body{flex:1;background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:10px 13px}
.comment-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.comment-name{font-weight:700;font-size:13px}
.comment-time{font-size:11px;color:var(--text3);font-family:var(--mono)}
.comment-text{font-size:13px;color:var(--text);line-height:1.6}
.action-approve{border-color:rgba(26,122,74,.3)!important;background:rgba(26,122,74,.05)!important}
.action-reject{border-color:rgba(185,64,0,.3)!important;background:rgba(185,64,0,.05)!important}
.action-changes{border-color:rgba(138,106,0,.3)!important;background:rgba(138,106,0,.05)!important}

/* ── ADMIN PANEL ── */
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.admin-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:rgba(255,255,255,.02)}

/* ── QUEUE ── */
.queue-item{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.queue-item:hover{border-color:var(--border2);transform:translateY(-1px)}
.queue-item .qi-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.queue-item .qi-title{font-weight:600;font-size:14px;margin-bottom:3px}
.queue-item .qi-meta{font-size:12px;color:var(--text2)}

@media(max-width:600px){.form-row{grid-template-columns:1fr}}

function Badge({children,bg,color,bd}) {

function RoleBadge({role}) {

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

  const colors = ['#005EB8','#1a7a4a','#8a6a00','#b94000','#4a6aaa'];

}

    setPwErr('');
    var ok = pwNext.length >= 8;
    if(!ok){setPwErr('Min 8 characters');return;}
    if(pwNext!==pwConfirm){setPwErr('Passwords do not match');return;}
    setPwSaving(true);
    var res = await db.auth.updateUser({password:pwNext});
    setPwSaving(false);
    if(res.error){setPwErr(res.error.message);return;}
    setPwOk(true);
    setPwNext('');setPwConfirm('');
    setTimeout(function(){onClose();},1500);
  }

  return (
    <div className={'modal-overlay'} onClick={onClose}>
      <div className={'modal'} onClick={function(e){e.stopPropagation();}}>
        <div className={'modal-header'}><h2>Change Password</h2><button className={'btn btn-ghost btn-icon'} onClick={onClose}><IX s={15}/></button></div>
        <div className={'modal-body'}>
          {pwErr&&<div className={'err'}>{pwErr}</div>}
          {pwOk&&<div style={{color:'#1a7a4a',padding:'8px 0'}}>Password updated!</div>}
          <div className={'form-group'}><label className={'form-label'}>New Password</label><input className={'form-input'} type={'password'} value={pwNext} onChange={function(e){setPwNext(e.target.value);}} autoFocus/></div>
          <div className={'form-group'}><label className={'form-label'}>Confirm Password</label><input className={'form-input'} type={'password'} value={pwConfirm} onChange={function(e){setPwConfirm(e.target.value);}}/></div>
        </div>
        <div className={'modal-footer'}>
          <button className={'btn btn-ghost'} onClick={onClose}>Cancel</button>
          <button className={'btn btn-primary'} onClick={doChange} disabled={pwSaving}>{pwSaving?'Saving...':'Update Password'}</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(undefined);
  const [profile, setProfile] = useState(null);
  const [page, setPage]       = useState('projects');
  const [project, setProject] = useState(null);
  const [notifications, setNotifications] = useState([]);

  useEffect(() => {
    db.auth.getSession().then(({data:{session}}) => setSession(session));
    const {data:{subscription}} = db.auth.onAuthStateChange((_,s) => {
      setSession(s);
      if (!s) { setProfile(null); setPage('projects'); setProject(null); }
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (session) loadProfile();
  }, [session]);

  async function loadProfile() {
    const {data} = await db.from('profiles').select('*').eq('id', session.user.id).single();
    setProfile(data);
  }

  async function loadNotifications() {
    if (!session) return;
    const {data} = await db.from('notifications').select('*').eq('user_id', session.user.id).order('created_at',{ascending:false}).limit(20);
    setNotifications(data||[]);
  }

  useEffect(() => {
    if (session) loadNotifications();
  }, [session]);

  if (session === undefined) return <Splash text={'Loading…'}/>;
  if (!session) return <AuthScreen/>;
  if (!profile) return <Splash text={'Loading profile…'}/>;
  // Unassigned users get read-only access;

  return (
    <AppContext.Provider value={{session, profile, loadProfile, notifications, loadNotifications, isReadOnly:profile.role==='Unassigned'}}>
      {page === 'projects' && <ProjectList onOpen={p=>{setProject(p);setPage('project')}} onAdmin={()=>setPage('admin')} onQueue={()=>setPage('queue')} onOptions={()=>setPage('options')} onDash={()=>setPage('dashboard')}/>}
      {page === 'project'  && <ProjectView project={project} onBack={()=>{setProject(null);setPage('projects')}}/>}
      {page === 'admin'    && profile.role==='System Admin' && <AdminPanel onBack={()=>setPage('projects')}/>}
      {page === 'options'   && profile.role==='System Admin' && <OptionsPage onBack={()=>setPage('projects')}/>}
      {page === 'queue'    && <ApprovalQueue onBack={()=>setPage('projects')} onOpen={p=>{setProject(p);setPage('project')}}/>
      }
      {page === 'dashboard' && <DashboardPage onBack={()=>setPage('projects')}/>}
    </AppContext.Provider>
  );
}

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen() {
  const [mode, setMode]     = useState('login');
  const [email, setEmail]   = useState('');
  const [pass, setPass]     = useState('');
  const [name, setName]     = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]       = useState('');
  const [msg, setMsg]       = useState('');

  async function submit() {
    setErr(''); setMsg(''); setLoading(true);
    if (mode === 'login') {
      const {error} = await db.auth.signInWithPassword({email, password:pass});
      if (error) setErr(error.message);
    } else {
      const {error} = await db.auth.signUp({email, password:pass, options:{data:{full_name:name}}});
      if (error) setErr(error.message);
      else setMsg('Account created! You can now log in.');
    }
    setLoading(false);
  }

  function onKey(e) { if (e.key==='Enter') submit(); }

  return (
    <div className={'auth-wrap'}>
      <div className={'auth-card'}>
        <div className={'auth-logo'}>RF</div>
        <h1>ReqFlow</h1>
        <div className={'auth-sub'}>{mode==='login'?'Sign in to continue':'Create your account'}</div>
        {err && <div className={'err'}>{err}</div>}
        {msg && <div style={{color:'var(--c2)',fontSize:13,marginBottom:14,padding:'8px 12px',background:'rgba(127,255,107,.08)',borderRadius:8}}>{msg}</div>}
        {mode==='register' && (
          <div className={'form-group'}>
            <label className={'form-label'}>Full Name</label>
            <input className={'form-input'} placeholder={'Your name'} value={name} onChange={e=>setName(e.target.value)} onKeyDown={onKey}/>
          </div>
        )}
        <div className={'form-group'}>
          <label className={'form-label'}>Email</label>
          <input className={'form-input'} type={'email'} placeholder={'you@company.com'} value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={onKey}/>
        </div>
        <div className={'form-group'}>
          <label className={'form-label'}>Password</label>
          <input className={'form-input'} type={'password'} placeholder={'••••••••'} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={onKey}/>
        </div>
        <button className={'btn btn-primary'} style={{width:'100%',justifyContent:'center',marginTop:8}} onClick={submit} disabled={loading}>
          {loading?'Please wait…':mode==='login'?'Sign In':'Create Account'}
        </button>
        <div className={'auth-switch'}>
          {mode==='login'?<>No account? <button onClick={()=>{setMode('register');setErr('')}}>Register</button></>
                         :<>Have an account? <button onClick={()=>{setMode('login');setErr('')}}>Sign In</button></>}
        </div>
      </div>
    </div>
  );
}

function ProjectList({onOpen, onAdmin, onQueue, onOptions, onDash}) {
  const {profile, isReadOnly} = useApp();
  const [projects, setProjects] = useState([]);
  const [counts, setCounts]     = useState({});
  const [loading, setLoading]   = useState(true);
  const [showNew, setShowNew]   = useState(false);
  const [editProject, setEditProject] = useState(null);

  const [myRoles, setMyRoles] = useState({});

  async function load() {
    setLoading(true);
    let projData = [];
    if (profile.role === 'System Admin' || profile.role === 'Unassigned') {
      const {data} = await db.from('projects').select('*').order('created_at',{ascending:false});
      projData = data || [];
    } else {
      const {data:mem} = await db.from('project_members').select('project_id, role').eq('user_id', profile.id);
      const roles = {};
      (mem||[]).forEach(m => roles[m.project_id] = m.role);
      setMyRoles(roles);
      if (Object.keys(roles).length) {
        const {data} = await db.from('projects').select('*').in('id', Object.keys(roles)).order('created_at',{ascending:false});
        projData = data || [];
      }
    }
    setProjects(projData);
    if (projData.length) {
      const {data:mem2} = await db.from('project_members').select('project_id,role').eq('user_id',profile.id);
      const roles2={};(mem2||[]).forEach(m=>roles2[m.project_id]=m.role);
      setMyRoles(roles2);
      const ids = projData.map(p=>p.id);
      const {data:rr} = await db.from('requirements').select('project_id').in('project_id',ids);
      const c={};ids.forEach(id=>c[id]=0);
      rr?.forEach(r=>c[r.project_id]=(c[r.project_id]||0)+1);
      setCounts(c);
    }
    setLoading(false);
  }

  useEffect(()=>{load();},[]);

  async function del(id,e) {
    e.stopPropagation();
    if (!confirm('Delete this project and all its requirements?')) return;
    await db.from('projects').delete().eq('id',id);
    load();
  }

  const isAdmin = profile?.role === 'System Admin';

  return (
    <div style={{minHeight:'100vh'}}>
      <Topbar actions={
        <>
          {!isReadOnly && <button className={'btn btn-ghost btn-sm'} onClick={onQueue}><IList s={13}/> My Queue</button>}
          {!isReadOnly && <button className={'btn btn-ghost btn-sm'} onClick={onDash}>Dashboard</button>}
          {isAdmin && <button className={'btn btn-ghost btn-sm'} onClick={onAdmin}><IUsers s={13}/> Users</button>}
          {isAdmin && <button className={'btn btn-ghost btn-sm'} onClick={onOptions}><IShield s={13}/> Options</button>}
          {isAdmin && <button className={'btn btn-primary btn-sm'} onClick={()=>setShowNew(true)}><IPlus s={13}/> New Project</button>}
          {isReadOnly && <span style={{fontFamily:'var(--mono)',fontSize:11,padding:'4px 10px',borderRadius:6,background:'rgba(100,116,139,.15)',color:'var(--text3)',border:'1px solid rgba(100,116,139,.25)'}}>READ ONLY</span>}
        </>
      }/>
      <div style={{padding:'28px 24px',maxWidth:960,margin:'0 auto'}}>
        <div style={{marginBottom:24}}>
          <h1 style={{fontSize:24,fontWeight:800,marginBottom:4}}>Projects</h1>
          <p style={{color:'var(--text2)',fontSize:13}}>Select a project to manage its requirements</p>
        </div>
        {loading && <div className={'empty'}><div className={'empty-icon'}>⏳</div><h3>Loading…</h3></div>}
        {!loading && projects.length===0 && (
          <div className={'empty'}>
            <div className={'empty-icon'}>📂</div>
            <h3>{isAdmin ? 'No projects yet' : 'No projects assigned'}</h3>
            <p>{isAdmin ? '' : 'Ask an Admin to add you to a project'}</p>
            {isAdmin && <button className={'btn btn-primary'} onClick={()=>setShowNew(true)}><IPlus s={13}/> Create Project</button>}
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14}}>
          {projects.map(p=>{
            const myRole = myRoles[p.id];
            const rc = myRole ? (ROLE_CLR[myRole]||'#64748b') : null;
            return (
              <div key={p.id} className={'card'} onClick={()=>onOpen({...p, myProjectRole: myRole||'Project Admin'})} style={{cursor:'pointer',transition:'all .2s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.transform='translateY(-2px)'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform='none'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div style={{width:38,height:38,borderRadius:9,background:'rgba(0,94,184,.1)',border:'1px solid rgba(0,94,184,.2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <IFolder s={16}/>
                  </div>
                  {(isAdmin||(myRoles[p.id]==='Project Admin'))&&!isReadOnly&&<button className={'btn btn-ghost btn-sm btn-icon'} onClick={e=>{e.stopPropagation();setEditProject(p);}}><IEdit s={12}/></button>}
                   {isAdmin && !isReadOnly && <button className={'btn btn-ghost btn-sm btn-icon'} onClick={e=>del(p.id,e)}><ITrash s={12}/></button>}
                </div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{p.name}</div>
                {p.description && <div style={{color:'var(--text2)',fontSize:12,marginBottom:10,lineHeight:1.5}}>{p.description.slice(0,80)}{p.description.length>80?'..':''}</div>}
                <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:8}}>
                  <Badge bg={'var(--raised)'} color={'var(--text2)'} bd={'var(--border)'}>{counts[p.id]||0} reqs</Badge>
                  {myRole && <Badge bg={`${rc}18`} color={rc} bd={`${rc}33`}>{myRole}</Badge>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {showNew && <ProjectModal onClose={()=>setShowNew(false)} onSaved={()=>{setShowNew(false);load();}}/>}
      {editProject && <ProjectModal project={editProject} onClose={()=>setEditProject(null)} onSaved={()=>{setEditProject(null);load();}}/>}
    </div>
  );
}

function ProjectModal({onClose,onSaved,project}) {
  const isEdit=!!project;
  const [form,setForm]=useState({name:project?project.name:'',description:project?project.description||'':''});
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  async function save() {
    if (!form.name.trim()){setErr('Name required');return;}
    setSaving(true);
    const {error}=isEdit?await db.from('projects').update({name:form.name.trim(),description:form.description}).eq('id',project.id):await db.from('projects').insert([{name:form.name.trim(),description:form.description}]);
    setSaving(false);
    if (error){setErr(error.message);return;}
    onSaved();
  }
  return (
    <div className={'modal-overlay'} onClick={onClose}>
      <div className={'modal'} onClick={e=>e.stopPropagation()}>
        <div className={'modal-header'}><h2>{isEdit?'Edit Project':'New Project'}</h2><button className={'btn btn-ghost btn-icon'} onClick={onClose}><IX s={15}/></button></div>
        <div className={'modal-body'}>
          {err&&<div className={'err'}>{err}</div>}
          <div className={'form-group'}><label className={'form-label'}>Name *</label><input className={'form-input'} placeholder={'e.g. Brake Control Unit'} value={form.name} onChange={e=>set('name',e.target.value)} autoFocus/></div>
          <div className={'form-group'}><label className={'form-label'}>Description</label><textarea className={'form-textarea'} value={form.description} onChange={e=>set('description',e.target.value)}/></div>
        </div>
        <div className={'modal-footer'}>
          <button className={'btn btn-ghost'} onClick={onClose}>Cancel</button>
          <button className={'btn btn-primary'} onClick={save} disabled={saving}>{saving?'Saving…':isEdit?'Save Changes':'Create Project'}</button>
        </div>
      </div>
    </div>
  );
}


// ── BASELINE VIEWER ─────────────────────────────────────────────────────────
function BaselineViewer({baseline,project,onBack}) {
  var {profile,loadNotifications} = useApp();
  var snapRaw = baseline.snapshot||[];
  var snapSeen={};
  var snap = snapRaw.filter(function(r){var k=r.id||r.req_id;if(snapSeen[k])return false;snapSeen[k]=true;return true;});
  var [selected,setSelected] = React.useState(null);
  var [expanded,setExpanded] = React.useState({});

  // Build tree from snapshot
  function buildTree(flat) {
    var sorted=flat.slice().sort(function(a,b){return (a.sort_order||0)-(b.sort_order||0);});
    var map={};
    sorted.forEach(function(r){map[r.id]={...r,children:[]};});
    var roots=[];
    sorted.forEach(function(r){
      if(r.parent_id&&map[r.parent_id]){map[r.parent_id].children.push(map[r.id]);}
      else{roots.push(map[r.id]);}
    });
    return roots;
  }
  var tree = buildTree(snap);

  // Enrich selected with _comments/_activity/_evidence from snapshot
  var enriched = selected ? snap.find(function(r){return r.req_id===selected.req_id;})||selected : null;

  var dt = new Date(baseline.created_at);
  var ds = dt.toLocaleDateString('es-ES')+' '+dt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});

  return (
    <AppContext.Provider value={{profile:profile,loadNotifications:loadNotifications,isReadOnly:true}}>
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
        <div style={{background:'var(--c1)',color:'#fff',padding:'0 20px',height:54,display:'flex',alignItems:'center',gap:12,flexShrink:0}}>

            <div style={{padding:'9px 18px',borderBottom:'1px solid var(--border)',background:'var(--surface)',display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>{snap.length} requirements</span>
              {baseline.description&&<span style={{fontSize:12,color:'var(--text2)',fontStyle:'italic'}}>{baseline.description}</span>}
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
              {tree.map(function(n){return <BaselineTreeNode key={n.req_id||n.id} node={n} depth={0} expanded={expanded} onToggle={function(id){setExpanded(function(e){var x={...e};x[id]=!x[id];return x;});}} selectedId={selected&&selected.req_id} onSelect={function(r){setSelected(function(s){return s&&s.req_id===r.req_id?null:r;});}}/>;})}
            </div>
          </div>
          {enriched&&(
            <div style={{flex:1,overflowY:'auto',background:'var(--surface)'}}>
              <BaselineDetailPanel req={enriched} allReqs={snap} onClose={function(){setSelected(null);}}/>
            </div>
          )}
        </div>
      </div>
    </AppContext.Provider>
  );
}

function BaselineTreeNode({node,depth,expanded,onToggle,selectedId,onSelect}) {
  var isOpen=expanded[node.id]!==false&&(expanded[node.id]||depth<2);
  var hasKids=node.children&&node.children.length>0;
  var isSel=selectedId===node.req_id;
  var lc=LEVEL_CLR[node.level]||'#64748b';
  var sc=ST_CLR[node.status]||ST_CLR['Draft'];
  return (
    <div>
      <div onClick={function(){onSelect(node);}} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 16px 5px '+(16+depth*18)+'px',cursor:'pointer',background:isSel?'rgba(0,56,130,.07)':'transparent',borderLeft:isSel?'3px solid var(--c1)':'3px solid transparent'}}>
        {hasKids&&<button onClick={function(e){e.stopPropagation();onToggle(node.id);}} style={{background:'none',border:'none',padding:'0 2px',cursor:'pointer',color:'var(--text3)',fontSize:10}}>{isOpen?'▾':'▸'}</button>}
        {!hasKids&&<span style={{width:14}}/>}
        <span style={{fontFamily:'var(--mono)',fontSize:11,color:lc,fontWeight:600,flexShrink:0}}>{node.req_id}</span>
        <span style={{fontSize:12,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text)'}}>{node.title}</span>
        <span style={{fontSize:10,padding:'1px 6px',borderRadius:4,background:sc.bg,color:sc.text,border:'1px solid '+sc.bd,flexShrink:0}}>{node.status}</span>
      </div>
      {hasKids&&isOpen&&node.children.map(function(c){return <BaselineTreeNode key={c.id} node={c} depth={depth+1} expanded={expanded} onToggle={onToggle} selectedId={selectedId} onSelect={onSelect}/>;})}
    </div>
  );
}

              var d=new Date(v.approved_at);

              var prev=v.v>1?vh[v.v-2]:null;
              function chg(cur,old){return prev&&String(cur||'')!==String(old||'');}
              var diffBg='rgba(255,209,102,.10)';var diffBd='rgba(255,209,102,.35)';var diffClr='#8a6a00';
              function fld(label,cur,old){
                var changed=chg(cur,old);
                return(
                  <div className={'form-group'} style={{margin:0,background:changed?diffBg:'transparent',border:changed?('1px solid '+diffBd):'1px solid transparent',borderRadius:6,padding:changed?'4px 7px':'0'}}>
