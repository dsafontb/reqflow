// -- MEMBERS MODAL --
function MembersModal({projectId, onClose}) {
  const {profile} = useApp();
  const [members, setMembers]   = useState([]);
  const [allUsers, setAllUsers] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [addUserId, setAddUserId] = useState('');
  const [addRole, setAddRole]   = useState('Designer');
  const [saving, setSaving]     = useState(false);

  async function load() {
    setLoading(true);
    const {data:mm} = await db.from('project_members').select('*').eq('project_id', projectId);
    setMembers(mm||[]);
    const {data:uu} = await db.from('profiles').select('*').order('full_name');
    setAllUsers(uu||[]);
    setLoading(false);
  }

  useEffect(()=>{load();},[]);

  async function addMember() {
    if (!addUserId) return;
    setSaving(true);
    await db.from('project_members').upsert([{project_id:projectId, user_id:addUserId, role:addRole, added_by:profile.id}], {onConflict:'project_id,user_id'});
    setAddUserId('');
    setSaving(false);
    load();
  }

  async function changeRole(userId, role) {
    await db.from('project_members').update({role}).eq('project_id',projectId).eq('user_id',userId);
    load();
  }

  async function removeMember(userId) {
    if (!confirm('Remove this member from the project?')) return;
    await db.from('project_members').delete().eq('project_id',projectId).eq('user_id',userId);
    load();
  }

  const memberIds = members.map(m=>m.user_id);
  const nonMembers = allUsers.filter(u=>!memberIds.includes(u.id) && u.role!=='Unassigned');
  const memberProfiles = members.map(m=>({...m, profile:allUsers.find(u=>u.id===m.user_id)})).filter(m=>m.profile);

  return (
    <div className={'modal-overlay'} onClick={onClose}>
      <div className={'modal'} onClick={e=>e.stopPropagation()}>
        <div className={'modal-header'}><h2>Project Members</h2><button className={'btn btn-ghost btn-icon'} onClick={onClose}><IX s={15}/></button></div>
        <div className={'modal-body'}>
          {loading ? <div style={{textAlign:'center',padding:20,color:'var(--text3)'}}>Loading...</div> : <>
            {/* Member list */}
            {memberProfiles.length===0 && <div style={{color:'var(--text3)',fontSize:13,marginBottom:16}}>No members yet.</div>}
            {memberProfiles.map(m=>{
              const ac = avatarColor(m.profile.full_name);
              const rc = ROLE_CLR[m.role]||'#64748b';
              return(
                <div key={m.user_id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:'var(--bg)',borderRadius:9,border:'1px solid var(--border)',marginBottom:7}}>
                  <div style={{width:30,height:30,borderRadius:'50%',background:ac,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'#000',flexShrink:0}}>{initials(m.profile.full_name)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{m.profile.full_name}</div>
                    <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>{m.profile.role} (global)</div>
                  </div>
                  <select className={'form-select'} style={{width:'auto',fontSize:12,padding:'4px 8px'}} value={m.role} onChange={e=>changeRole(m.user_id,e.target.value)}>
                    {PROJECT_ROLES.map(r=><option key={r}>{r}</option>)}
                  </select>
                  <button className={'btn btn-ghost btn-sm btn-icon'} onClick={()=>removeMember(m.user_id)} style={{color:'var(--c4)',opacity:.6}}><IX s={12}/></button>
                </div>
              );
            })}
            {/* Add member */}
            {nonMembers.length > 0 && <>
              <div style={{height:1,background:'var(--border)',margin:'14px 0'}}/>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:10}}>Add Member</div>
              <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                <div className={'form-group'} style={{flex:1,marginBottom:0}}>
                  <label className={'form-label'}>User</label>
                  <select className={'form-select'} value={addUserId} onChange={e=>setAddUserId(e.target.value)}>
                    <option value={''}>Select user...</option>
                    {nonMembers.map(u=><option key={u.id} value={u.id}>{u.full_name}</option>)}
                  </select>
                </div>
                <div className={'form-group'} style={{width:130,marginBottom:0}}>
                  <label className={'form-label'}>Role</label>
                  <select className={'form-select'} value={addRole} onChange={e=>setAddRole(e.target.value)}>
                    {PROJECT_ROLES.map(r=><option key={r}>{r}</option>)}
                  </select>
                </div>
                <button className={'btn btn-primary'} onClick={addMember} disabled={saving||!addUserId} style={{flexShrink:0,marginBottom:0}}><IPlus s={13}/> Add</button>
              </div>
            </>}
            {nonMembers.length===0 && allUsers.filter(u=>u.role!=='Unassigned').length>0 && (
              <div style={{fontSize:13,color:'var(--text3)',fontStyle:'italic',marginTop:12}}>All active users are already members of this project.</div>
            )}
          </>}
        </div>
        <div className={'modal-footer'}>
          <button className={'btn btn-primary'} onClick={onClose}>Done</button>
        </div>
      </div>
    </div>
  );
}

function ReqModal({projectId,req,defParentId,allReqs,onClose,onSaved}) {
  const isEdit=!!req;
  const isProjAdminReq = req?.myProjectRole==='Project Admin';
  const isLocked = isEdit && !isProjAdminReq && (req?.status==='In Review'||req?.status==='Approved'||req?.status==='Rejected'||req?.status==='Obsolete');
  const init={req_id:'',title:'',description:'',level:'System',status:'Draft',parent_id:defParentId||'',owner:'',stakeholder:'',requirement_type:'Functional',verification_method:'Test',safety_class:'None',sil_level:'N/A',safety_category:'Quality',regulatory_body:[],project_phase:'Development',source_document:'',rationale:''};
  const [form,setForm]=useState(init);
  const [tab,setTab]=useState('basic');
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const [standards,setStandards]=useState(REGS_DEFAULT);

  useEffect(()=>{
    db.from('standards').select('name').eq('active',true).order('sort_order').then(({data})=>{
      if(data&&data.length) setStandards(data.map(s=>s.name));
    });
  },[]);

  useEffect(()=>{
    if(req){const {myProjectRole:_,verification_status:_vs,...reqClean}=req;setForm({...init,...reqClean,parent_id:req.parent_id||'',regulatory_body:req.regulatory_body||[]});}
    else{const p=PREFIXES[form.level]||'SYS';const n=String(allReqs.filter(r=>r.level===form.level).length+1).padStart(3,'0');setForm(f=>({...f,req_id:`${p}-${n}`}));}
  },[req]);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  function onLvl(level){const p=PREFIXES[level]||level.slice(0,3).toUpperCase();const n=String(allReqs.filter(r=>r.level===level).length+1).padStart(3,'0');setForm(f=>({...f,level,req_id:`${p}-${n}`}));}
  function toggleReg(b){setForm(f=>({...f,regulatory_body:f.regulatory_body.includes(b)?f.regulatory_body.filter(x=>x!==b):[...f.regulatory_body,b]}));}

  async function save(){
    if(!form.title.trim()){setErr('Title required');return;}
    if(!form.req_id.trim()){setErr('ID required');return;}
    setSaving(true);setErr('');
    const {myProjectRole:_mpr, _actStatus:_as, ...formClean} = form;
    const payload={...formClean,project_id:projectId,parent_id:form.parent_id||null,title:form.title.trim(),req_id:form.req_id.trim()};
    const {error}=isEdit?await db.from('requirements').update(payload).eq('id',req.id):await db.from('requirements').insert([payload]);
    setSaving(false);
    if(error){setErr(error.message);return;}
    onSaved();
  }

  const parents=allReqs.filter(r=>r.id!==req?.id);
  const TABS=[{id:'basic',label:'Basic'},{id:'safety',label:'Safety'}];

  return (
    <div className={'modal-overlay'} onClick={onClose}>
      <div className={'modal'} onClick={e=>e.stopPropagation()}>
        <div className={'modal-header'}><h2>{isEdit?'Edit Requirement':'New Requirement'}</h2><button className={'btn btn-ghost btn-icon'} onClick={onClose}><IX s={15}/></button></div>
        <div className={'tab-bar'}>{TABS.map(t=><button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}</div>
        <div className={'modal-body'}>
          {err&&<div className={'err'}>{err}</div>}
          {tab==='basic'&&<>
            <div className={'form-row'}>
              <div className={'form-group'}><label className={'form-label'}>Level</label><select className={'form-select'} value={form.level} onChange={e=>onLvl(e.target.value)} disabled={isLocked}>{LEVELS.map(l=><option key={l}>{l}</option>)}</select></div>
              <div className={'form-group'}><label className={'form-label'}>ID *</label><input className={'form-input'} value={form.req_id} onChange={e=>set('req_id',e.target.value)} disabled={isLocked}/></div>
            </div>
            <div className={'form-group'}><label className={'form-label'}>Title *</label><input className={'form-input'} value={form.title} onChange={e=>set('title',e.target.value)} autoFocus disabled={isLocked}/></div>
            <div className={'form-group'}><label className={'form-label'}>Description (Shall Statement)</label><textarea className={'form-textarea'} value={form.description} onChange={e=>set('description',e.target.value)} placeholder={'The system shall…'} disabled={isLocked}/></div>
            <div className={'form-row'}>
              <div className={'form-group'}><label className={'form-label'}>Status</label><select className={'form-select'} value={form.status} onChange={e=>set('status',e.target.value)}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
              <div className={'form-group'}><label className={'form-label'}>Verification Method</label><select className={'form-select'} value={form.verification_method} onChange={e=>set('verification_method',e.target.value)} disabled={isLocked}>{VERIFY.map(v=><option key={v}>{v}</option>)}</select></div>
            </div>
            <div className={'form-row'}>
              <div className={'form-group'}><label className={'form-label'}>Parent</label><select className={'form-select'} value={form.parent_id} onChange={e=>set('parent_id',e.target.value)}><option value={''}>— None —</option>{parents.map(r=><option key={r.id} value={r.id}>{r.req_id} — {r.title.slice(0,34)}</option>)}</select></div>
              <div className={'form-group'}><label className={'form-label'}>Owner</label><input className={'form-input'} value={form.owner} onChange={e=>set('owner',e.target.value)} placeholder={'Name or role'} disabled={isLocked}/></div>
            </div>
            <div className={'form-row'}>
              <div className={'form-group'}><label className={'form-label'}>Stakeholder</label><input className={'form-input'} value={form.stakeholder||''} onChange={e=>set('stakeholder',e.target.value)} placeholder={'Name or org'}/></div>
              <div className={'form-group'}><label className={'form-label'}>Type</label><input className={'form-input'} list={'req-types-list'} value={form.requirement_type||''} onChange={e=>set('requirement_type',e.target.value)} placeholder={'e.g. Functional'}/><datalist id={'req-types-list'}>{[...new Set(allReqs.map(r=>r.requirement_type).filter(Boolean))].map(t=><option key={t} value={t}/>)}</datalist></div>
            </div>
            <div className={'form-group'}><label className={'form-label'}>Rationale</label><textarea className={'form-textarea'} value={form.rationale} onChange={e=>set('rationale',e.target.value)} disabled={isLocked}/></div>
          </>}
          {tab==='safety'&&<>
            <div className={'form-row'}>
              <div className={'form-group'}><label className={'form-label'}>Safety Class</label><select className={'form-select'} value={form.safety_class} onChange={e=>set('safety_class',e.target.value)}>{SAFETY.map(s=><option key={s}>{s}</option>)}</select></div>
              <div className={'form-group'}><label className={'form-label'}>SIL Level</label><select className={'form-select'} value={form.sil_level} onChange={e=>set('sil_level',e.target.value)}>{SILS.map(s=><option key={s}>{s}</option>)}</select></div>
            </div>
            <div className={'form-group'}><label className={'form-label'}>Safety Category</label><select className={'form-select'} value={form.safety_category} onChange={e=>set('safety_category',e.target.value)}>{SAFECAT.map(s=><option key={s}>{s}</option>)}</select></div>
            <div className={'form-group'}><label className={'form-label'}>Standards</label><div style={{display:'flex',flexWrap:'wrap',gap:7,marginTop:4}}>{standards.map(b=><div key={b} className={`chip ${form.regulatory_body.includes(b)?'on':''}`} onClick={()=>toggleReg(b)}>{b}</div>)}</div></div>
          </>}

        </div>
        <div className={'modal-footer'}>
          <button className={'btn btn-ghost'} onClick={onClose}>Cancel</button>
          <button className={'btn btn-primary'} onClick={save} disabled={saving}>{saving?'Saving…':isEdit?'Save Changes':'Create'}</button>
        </div>
      </div>
    </div>
  );
}

// ── APPROVAL QUEUE ────────────────────────────────────────────────────────────
function ApprovalQueue({onBack, onOpen}) {
  const {profile} = useApp();
  const [items,setItems] = useState([]);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{load();},[]);

  async function load() {
    setLoading(true);
    let reqs=[];
    if(profile.role==='Approver'||profile.role==='System Admin'){
      const {data:assignments}=await db.from('approver_assignments').select('requirement_id').eq('approver_id',profile.id);
      const ids=(assignments||[]).map(a=>a.requirement_id);
      if(ids.length){
        const {data}=await db.from('requirements').select('*, projects(name)').in('id',ids).eq('status','In Review');
        reqs=data||[];
      }
    }
    if(profile.role==='Designer'||profile.role==='System Admin'){
      const {data}=await db.from('requirements').select('*, projects(name)').in('status',['In Review','Changes Requested','Approved']);
      const mine=(data||[]).filter(r=>!reqs.find(x=>x.id===r.id));
      reqs=[...reqs,...mine];
    }
    setItems(reqs);
    setLoading(false);
  }

  return (
    <div style={{minHeight:'100vh'}}>
      <Topbar sub={'My Queue'} actions={<button className={'btn btn-ghost btn-sm btn-icon'} onClick={onBack}><IBack s={15}/></button>}/>
      <div style={{padding:'28px 24px',maxWidth:760,margin:'0 auto'}}>
        <div style={{marginBottom:24}}>
          <h1 style={{fontSize:22,fontWeight:800,marginBottom:4}}>My Queue</h1>
          <p style={{color:'var(--text2)',fontSize:13}}>{profile.role==='Approver'?'Requirements awaiting your approval':'Requirements in review or recently acted on'}</p>
        </div>
        {loading&&<div className={'empty'}><div className={'empty-icon'}>⏳</div><h3>Loading…</h3></div>}
        {!loading&&items.length===0&&<div className={'empty'}><div className={'empty-icon'}>✅</div><h3>Queue is empty</h3><p>Nothing pending right now</p></div>}
        {items.map(r=>{
          const sc=ST_CLR[r.status]||ST_CLR['Draft'];
          const lc=LEVEL_CLR[r.level]||'#64748b';
          return(
            <div key={r.id} className={'queue-item'} onClick={()=>onOpen(r.projects)}>
              <div className={'qi-top'}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:lc}}>{r.req_id}</span>
                <Badge bg={sc.bg} color={sc.text} bd={sc.bd}>{r.status}</Badge>
                <span style={{fontSize:12,color:'var(--text3)',marginLeft:'auto'}}>{r.projects?.name}</span>
              </div>
              <div className={'qi-title'}>{r.title}</div>
              {r.description&&<div className={'qi-meta'}>{r.description.slice(0,100)}{r.description.length>100?'…':''}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// -- STANDARDS MANAGER --
function StandardsManager({onClose}) {
  const [standards, setStandards] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [newName, setNewName]     = useState('');
  const [newVersion, setNewVersion] = useState('');
  const [newFullName, setNewFullName] = useState('');
  const [saving, setSaving]       = useState(false);
  const [err, setErr]             = useState('');

  async function load() {
    setLoading(true);
    const {data} = await db.from('standards').select('*').order('sort_order').order('created_at');
    if (data) setStandards(data);
    setLoading(false);
  }

  useEffect(()=>{load();},[]);

  async function add() {
    if (!newName.trim()) { setErr('Code required'); return; }
    setSaving(true); setErr('');
    const maxOrder = standards.reduce((m,s)=>Math.max(m,s.sort_order||0),0);
    const {error} = await db.from('standards').insert([{name:newName.trim(), version:newVersion.trim()||null, full_name:newFullName.trim()||null, sort_order:maxOrder+1}]);
    if (error) { setErr(error.message); setSaving(false); return; }
    setNewName(''); setNewVersion(''); setNewFullName('');
    setSaving(false);
    load();
  }

  async function toggleActive(id, active) {
    await db.from('standards').update({active:!active}).eq('id',id);
    load();
  }

  async function del(id) {
    if (!confirm('Delete this standard? It will be removed from all requirements that use it.')) return;
    await db.from('standards').delete().eq('id',id);
    load();
  }

  return (
    <div className={'modal-overlay'} onClick={onClose}>
      <div className={'modal'} onClick={e=>e.stopPropagation()}>
        <div className={'modal-header'}><h2>Manage Standards</h2><button className={'btn btn-ghost btn-icon'} onClick={onClose}><IX s={15}/></button></div>
        <div className={'modal-body'}>
          {loading ? <div style={{textAlign:'center',padding:20,color:'var(--text3)'}}>Loading...</div> : <>
            {standards.map(s=>(

            <div style={{height:1,background:'var(--border)',margin:'16px 0'}}/>
            <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:10}}>Add Standard</div>
            {err && <div className={'err'}>{err}</div>}
            <div className={'form-row'}>
              <div className={'form-group'} style={{marginBottom:0,flex:'0 0 120px'}}>
                <label className={'form-label'}>Code *</label>
                <input className={'form-input'} placeholder={'EN 50155'} value={newName} onChange={e=>setNewName(e.target.value)}/>
              </div>
              <div className={'form-group'} style={{marginBottom:0,flex:'0 0 90px'}}>
                <label className={'form-label'}>Version</label>
                <input className={'form-input'} placeholder={'2021'} value={newVersion} onChange={e=>setNewVersion(e.target.value)}/>
              </div>
            </div>
            <div className={'form-group'}>
              <label className={'form-label'}>Full Name</label>
              <input className={'form-input'} placeholder={'Railway applications - Rolling stock - Electronic equipment'} value={newFullName} onChange={e=>setNewFullName(e.target.value)}/>
            </div>
          </>}
        </div>
        <div className={'modal-footer'}>
          <button className={'btn btn-ghost'} onClick={onClose}>Close</button>
          <button className={'btn btn-primary'} onClick={add} disabled={saving||!newName.trim()}>{saving?'Adding...':'Add Standard'}</button>
        </div>
      </div>
    </div>
  );
}

function StandardsPanel() {
  const [standards, setStandards] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [newName, setNewName]     = useState('');
  const [newVersion, setNewVersion] = useState('');
  const [newFullName, setNewFullName] = useState('');
  const [saving, setSaving]       = useState(false);
  const [err, setErr]             = useState('');

  async function load() {
    setLoading(true);
    const {data} = await db.from('standards').select('*').order('sort_order').order('created_at');
    if (data) setStandards(data);
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function add() {
    if (!newName.trim()) { setErr('Code required'); return; }
    setSaving(true); setErr('');
    const maxOrder = standards.reduce((m,s)=>Math.max(m,s.sort_order||0),0);
    const {error} = await db.from('standards').insert([{name:newName.trim(),version:newVersion.trim()||null,full_name:newFullName.trim()||null,sort_order:maxOrder+1}]);
    if (error) { setErr(error.message); setSaving(false); return; }
    setNewName(''); setNewVersion(''); setNewFullName('');
    setSaving(false); load();
  }

  async function toggleActive(id, active) {
    await db.from('standards').update({active:!active}).eq('id',id);
    load();
  }

  async function del(id) {
    if (!confirm('Delete this standard?')) return;
    await db.from('standards').delete().eq('id',id);
    load();
  }

  return (
    <div>
      <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>Standards</div>
      <div style={{fontSize:13,color:'var(--text2)',marginBottom:20}}>Manage the standards available for selection when creating or editing requirements.</div>
      <div className={'card'} style={{padding:0,overflow:'hidden',marginBottom:16}}>
        {loading ? <div style={{padding:24,textAlign:'center',color:'var(--text3)'}}>Loading...</div> : (
          <table className={'admin-table'}>
            <thead><tr><th>Code</th><th>Version</th><th>Full Name</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {standards.map(s=>(
                <tr key={s.id} style={{opacity:s.active?1:.45}}>
                  <td><span style={{fontFamily:'var(--mono)',fontSize:12,color:s.active?'var(--c1)':'var(--text3)',fontWeight:700}}>{s.name}</span></td>
                  <td><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>{s.version||'—'}</span></td>
                  <td style={{color:'var(--text2)',fontSize:12}}>{s.full_name||'—'}</td>
                  <td><span style={{fontFamily:'var(--mono)',fontSize:11,padding:'2px 8px',borderRadius:4,background:s.active?'rgba(127,255,107,.1)':'rgba(100,116,139,.1)',color:s.active?'var(--c2)':'var(--text3)',border:`1px solid ${s.active?'rgba(127,255,107,.2)':'rgba(100,116,139,.2)'}`}}>{s.active?'Active':'Disabled'}</span></td>
                  <td style={{textAlign:'right'}}>
                    <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                      <button className={`btn btn-sm ${s.active?'btn-ghost':'btn-success'}`} onClick={()=>toggleActive(s.id,s.active)}>{s.active?'Disable':'Enable'}</button>
                      <button className={'btn btn-ghost btn-sm btn-icon'} onClick={()=>del(s.id)} style={{color:'var(--c4)',opacity:.6}}><ITrash s={11}/></button>
                    </div>
                  </td>
                </tr>
              ))}
              {standards.length===0&&<tr><td colSpan={5} style={{textAlign:'center',color:'var(--text3)',fontStyle:'italic'}}>No standards yet</td></tr>}
            </tbody>
          </table>
        )}
      </div>
      {/* Add new */}
      <div className={'card'}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:14}}>Add Standard</div>
        {err&&<div className={'err'}>{err}</div>}
        <div className={'form-row'}>
          <div className={'form-group'} style={{marginBottom:0,flex:'0 0 120px'}}>
            <label className={'form-label'}>Code *</label>
            <input className={'form-input'} placeholder={'EN 50155'} value={newName} onChange={e=>setNewName(e.target.value)}/>
          </div>
          <div className={'form-group'} style={{marginBottom:0,flex:'0 0 90px'}}>
            <label className={'form-label'}>Version</label>
            <input className={'form-input'} placeholder={'2021'} value={newVersion} onChange={e=>setNewVersion(e.target.value)}/>
          </div>
        </div>
        <div className={'form-group'}>
          <label className={'form-label'}>Full Name</label>
          <input className={'form-input'} placeholder={'Railway applications - Rolling stock - Electronic equipment'} value={newFullName} onChange={e=>setNewFullName(e.target.value)}/>
        </div>
        <div style={{marginTop:12}}>
          <button className={'btn btn-primary'} onClick={add} disabled={saving||!newName.trim()}>{saving?'Adding...':'Add Standard'}</button>
        </div>
      </div>
    </div>
  );
}



// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function DashboardPage({onBack, projectId, projectName}) {
  const {profile} = useApp();
  const [tab, setTab] = useState('status');
  const [projects, setProjects] = useState([]);
  const [selectedProject, setSelectedProject] = useState(projectId||'all');
  const [reqs, setReqs] = useState([]);
  const [baselines, setBaselines] = useState([]);
  const [activities, setActivities] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(function(){loadData();},[]);

  async function loadData() {
    setLoading(true);
    if(projectId){setProjects([{id:projectId,name:projectName||'Project'}]);var allIds=[projectId];var {data:rr}=await db.from('requirements').select('*').in('project_id',allIds);setReqs(rr||[]);var {data:bb}=await db.from('project_baselines').select('*').in('project_id',allIds).order('created_at',{ascending:true});setBaselines(bb||[]);var reqIds=(rr||[]).map(function(r){return r.id;});if(reqIds.length){var {data:aa}=await db.from('verification_activities').select('*').in('requirement_id',reqIds);setActivities(aa||[]);}setLoading(false);return;}
    var isSysAdmin = profile.role === 'System Admin';
    var projData = [];
    if (isSysAdmin) {
      var {data:pd} = await db.from('projects').select('*').order('created_at',{ascending:false});
      projData = pd||[];
    } else {
      var {data:mem} = await db.from('project_members').select('project_id').eq('user_id',profile.id);
      var ids = (mem||[]).map(function(m){return m.project_id;});
      if (ids.length) {
        var {data:pd2} = await db.from('projects').select('*').in('id',ids);
        projData = pd2||[];
      }
    }
    setProjects(projData);
    var allIds = projData.map(function(p){return p.id;});
    if (allIds.length) {
      var {data:rr} = await db.from('requirements').select('*').in('project_id',allIds);
      setReqs(rr||[]);
      var {data:bb} = await db.from('project_baselines').select('*').in('project_id',allIds).order('created_at',{ascending:true});
      setBaselines(bb||[]);
      var reqIds = (rr||[]).map(function(r){return r.id;});
      if (reqIds.length) {
        var {data:aa} = await db.from('verification_activities').select('*').in('requirement_id',reqIds);
        setActivities(aa||[]);
      }
    }
    setLoading(false);
  }

  var filteredReqs = selectedProject==='all' ? reqs : reqs.filter(function(r){return r.project_id===selectedProject;});
  var filteredBaselines = selectedProject==='all' ? baselines : baselines.filter(function(b){return b.project_id===selectedProject;});

  var total = filteredReqs.length;
  var byStatus = {};
  STATUSES.forEach(function(s){byStatus[s]=filteredReqs.filter(function(r){return r.status===s;}).length;});
  var approved = byStatus['Approved']||0;
  var inReview = byStatus['In Review']||0;
  var actMap = {};
  activities.forEach(function(a){actMap[a.requirement_id]=a;});
  var verified = filteredReqs.filter(function(r){return r.verification_status==='Verified';}).length;
  var failed   = filteredReqs.filter(function(r){return r.verification_status==='Failed';}).length;
  var vDefined = filteredReqs.filter(function(r){var a=actMap[r.id];return a&&a.activity_status!=='Not Defined';}).length;

  var ST_COLORS = {
    'Approved':'#1a7a4a','In Review':'#8a6a00','Changes Requested':'#b94000',
    'Draft':'#5a7aaa','Obsolete':'#8aaad4','Rejected':'#8b2020'
  };
  var LEVELS_SHOWN = ['Stakeholder','System','Subsystem','Component'];

  function pct(n,d){return d===0?0:Math.round(n/d*100);}

  function MetricCard({label,value,sub,color}) {
    return (
      <div style={{background:'var(--raised)',borderRadius:10,padding:'12px 16px',minWidth:0}}>
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:4,textTransform:'uppercase',letterSpacing:.4,fontWeight:600}}>{label}</div>
        <div style={{fontSize:26,fontWeight:800,color:color||'var(--text)',lineHeight:1}}>{value}</div>
        {sub&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{sub}</div>}
      </div>
    );
  }

  function StackBar({items,total:tot}) {
    return (
      <div style={{display:'flex',height:20,borderRadius:4,overflow:'hidden',background:'var(--raised)'}}>
        {items.map(function(item){
          var w = tot===0?0:item.count/tot*100;
          if(w===0)return null;
          return <div key={item.label} style={{width:w+'%',background:item.color,transition:'width .3s'}} title={item.label+': '+item.count}/>;
        })}
      </div>
    );
  }

  if(loading) return (
    <div style={{minHeight:'100vh'}}>
      <Topbar sub={'Dashboard'} actions={<button className={'btn btn-ghost btn-sm btn-icon'} onClick={onBack}><IBack s={15}/></button>}/>
      <div className={'empty'}><div className={'empty-icon'}>⏳</div><h3>Loading…</h3></div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <Topbar sub={'Dashboard'} actions={<button className={'btn btn-ghost btn-sm btn-icon'} onClick={onBack}><IBack s={15}/></button>}/>
      <div style={{padding:'24px',maxWidth:1100,margin:'0 auto',width:'100%'}}>

        {/* Project selector + tabs */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {!projectId&&<span style={{fontSize:12,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:.4}}>Project</span>}
            {!projectId&&<select className={'form-select'} style={{width:'auto',fontSize:13}} value={selectedProject} onChange={function(e){setSelectedProject(e.target.value);}}>
              <option value={'all'}>All projects</option>
              {projects.map(function(p){return <option key={p.id} value={p.id}>{p.name}</option>;})}
            </select>}
            {projectId&&<span style={{fontSize:16,fontWeight:800,color:'var(--text)'}}>{projectName}</span>}
          </div>
          <div style={{display:'flex',gap:4,background:'var(--raised)',padding:3,borderRadius:8}}>
            {[['status','Status'],['vv','V&V Coverage'],['timeline','Timeline']].map(function(t){
              return (
                <button key={t[0]} onClick={function(){setTab(t[0]);}} style={{padding:'6px 14px',borderRadius:6,border:'none',cursor:'pointer',fontSize:13,fontWeight:tab===t[0]?700:400,background:tab===t[0]?'var(--surface)':'transparent',color:tab===t[0]?'var(--c1)':'var(--text2)',boxShadow:tab===t[0]?'0 1px 4px rgba(0,0,0,.08)':'none',transition:'all .15s'}}>
                  {t[1]}
                </button>
              );
            })}
          </div>
        </div>

        {/* ── TAB A: STATUS ── */}
        {tab==='status'&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:12,marginBottom:20}}>
              <MetricCard label={'Total reqs'} value={total} sub={'across all levels'}/>
              <MetricCard label={'Approved'} value={approved} sub={pct(approved,total)+'% of total'} color={'#1a7a4a'}/>
              <MetricCard label={'In review'} value={inReview} sub={pct(inReview,total)+'% of total'} color={'#8a6a00'}/>
              <MetricCard label={'Draft'} value={byStatus['Draft']||0} sub={pct(byStatus['Draft']||0,total)+'% of total'} color={'#5a7aaa'}/>
            </div>

            <div className={'card'} style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:14}}>Status breakdown by level</div>
              {LEVELS_SHOWN.map(function(level){
                var lr = filteredReqs.filter(function(r){return r.level===level;});
                var lc = LEVEL_CLR[level]||'#64748b';
                return (
                  <div key={level} style={{marginBottom:10}}>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
                      <span style={{width:90,fontSize:12,color:lc,fontWeight:600,textAlign:'right',flexShrink:0}}>{level}</span>
                      <div style={{flex:1}}>
                        <StackBar total={lr.length} items={STATUSES.map(function(s){return {label:s,count:lr.filter(function(r){return r.status===s;}).length,color:ST_COLORS[s]};})}/>
                      </div>
                      <span style={{width:28,fontSize:11,color:'var(--text3)',textAlign:'right',flexShrink:0}}>{lr.length}</span>
                    </div>
                  </div>
                );
              })}
              <div style={{display:'flex',flexWrap:'wrap',gap:10,marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
                {STATUSES.map(function(s){return (
                  <div key={s} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--text2)'}}>
                    <div style={{width:10,height:10,borderRadius:2,background:ST_COLORS[s],flexShrink:0}}/>
                    {s}
                  </div>
                );})}
              </div>
            </div>

            {filteredBaselines.length>0&&(
              <div className={'card'}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:14}}>Baseline comparison</div>
                {filteredBaselines.map(function(b){
                  var snap = b.snapshot||[];
                  var bt = snap.length;
                  return (
                    <div key={b.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                      <span style={{width:120,fontSize:11,color:'var(--text3)',textAlign:'right',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.name}</span>
                      <div style={{flex:1}}>
                        <StackBar total={bt} items={STATUSES.map(function(s){return {label:s,count:snap.filter(function(r){return r.status===s;}).length,color:ST_COLORS[s]};})}/>
                      </div>
                      <span style={{width:28,fontSize:11,color:'var(--text3)',textAlign:'right',flexShrink:0}}>{bt}</span>
                    </div>
                  );
                })}
                <div style={{display:'flex',alignItems:'center',gap:10,marginTop:4}}>
                  <span style={{width:120,fontSize:11,color:'var(--c1)',textAlign:'right',flexShrink:0,fontWeight:700}}>Current</span>
                  <div style={{flex:1}}>
                    <StackBar total={total} items={STATUSES.map(function(s){return {label:s,count:byStatus[s]||0,color:ST_COLORS[s]};})}/>
                  </div>
                  <span style={{width:28,fontSize:11,color:'var(--text3)',textAlign:'right',flexShrink:0}}>{total}</span>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── TAB B: V&V ── */}
        {tab==='vv'&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:12,marginBottom:20}}>
              <MetricCard label={'V coverage'} value={pct(vDefined,total)+'%'} sub={'activity defined'} color={'#005EB8'}/>
              <MetricCard label={'Verified'} value={verified} sub={pct(verified,approved)+'% of approved'} color={'#1a7a4a'}/>
              <MetricCard label={'Failed'} value={failed} sub={'need rework'} color={'#8b2020'}/>
              <MetricCard label={'Not started'} value={approved-verified-failed} sub={'approved, no V outcome'} color={'#5a7aaa'}/>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              <div className={'card'}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:14}}>Verification activity status</div>
                {['Not Defined','Defined','Planned','In Progress','Finished'].map(function(s){
                  var cnt = filteredReqs.filter(function(r){
                    var a=actMap[r.id];
                    if(s==='Not Defined') return !a||a.activity_status==='Not Defined';
                    return a&&a.activity_status===s;
                  }).length;
                  var ac = ACT_CLR[s]||ACT_CLR['Not Defined'];
                  return (
                    <div key={s} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                      <span style={{width:80,fontSize:11,color:'var(--text2)',textAlign:'right',flexShrink:0}}>{s}</span>
                      <div style={{flex:1,height:14,background:'var(--raised)',borderRadius:3,overflow:'hidden'}}>
                        <div style={{width:pct(cnt,total)+'%',height:'100%',background:ac.text,transition:'width .3s'}}/>
                      </div>
                      <span style={{width:28,fontSize:11,color:'var(--text3)',textAlign:'right'}}>{cnt}</span>
                    </div>
                  );
                })}
                <div style={{borderTop:'1px solid var(--border)',marginTop:8,paddingTop:8}}>
                  {['Verified','Failed'].map(function(s){
                    var cnt = filteredReqs.filter(function(r){return r.verification_status===s;}).length;
                    var col = s==='Verified'?'#1a7a4a':'#8b2020';
                    return (
                      <div key={s} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                        <span style={{width:80,fontSize:11,color:'var(--text2)',textAlign:'right',flexShrink:0}}>{s}</span>
                        <div style={{flex:1,height:14,background:'var(--raised)',borderRadius:3,overflow:'hidden'}}>
                          <div style={{width:pct(cnt,total)+'%',height:'100%',background:col}}/>
                        </div>
                        <span style={{width:28,fontSize:11,color:'var(--text3)',textAlign:'right'}}>{cnt}</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className={'card'}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:14}}>Verification method split</div>
                {['Test','Analysis','Inspection','Demonstration'].map(function(m){
                  var cnt = filteredReqs.filter(function(r){return r.verification_method===m;}).length;
                  var colors = {Test:'#005EB8',Analysis:'#4a6aaa',Inspection:'#8a6a00',Demonstration:'#1a7a4a'};
                  return (
                    <div key={m} style={{marginBottom:12}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                        <span style={{color:'var(--text2)'}}>{m}</span>
                        <span style={{fontWeight:700,color:'var(--text)'}}>{pct(cnt,total)}%</span>
                      </div>
                      <div style={{height:8,background:'var(--raised)',borderRadius:3,overflow:'hidden'}}>
                        <div style={{width:pct(cnt,total)+'%',height:'100%',background:colors[m],transition:'width .3s'}}/>
                      </div>
                    </div>
                  );
                })}
                {filteredBaselines.length>0&&(
                  <div style={{marginTop:14,padding:'10px 12px',background:'var(--raised)',borderRadius:8}}>
                    <div style={{fontSize:11,color:'var(--text3)',marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:.4}}>Latest baseline delta</div>
                    <div style={{fontSize:12,color:'var(--text)'}}>
                      {(function(){
                        var last = filteredBaselines[filteredBaselines.length-1];
                        var snap = last&&last.snapshot||[];
                        var snapVerified = snap.filter(function(r){return r.verification_status==='Verified';}).length;
                        var delta = verified - snapVerified;
                        return (delta>=0?'+':'')+delta+' verified since '+last.name;
                      })()}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className={'card'}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:14}}>V&V coverage by level</div>
              {LEVELS_SHOWN.map(function(level){
                var lr = filteredReqs.filter(function(r){return r.level===level;});
                var lVerified = lr.filter(function(r){return r.verification_status==='Verified';}).length;
                var lFailed   = lr.filter(function(r){return r.verification_status==='Failed';}).length;
                var lDefined  = lr.filter(function(r){var a=actMap[r.id];return a&&a.activity_status!=='Not Defined';}).length;
                var lc = LEVEL_CLR[level]||'#64748b';
                return (
                  <div key={level} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                    <span style={{width:90,fontSize:12,color:lc,fontWeight:600,textAlign:'right',flexShrink:0}}>{level}</span>
                    <div style={{flex:1,display:'flex',gap:4}}>
                      <div style={{flex:1,height:16,background:'var(--raised)',borderRadius:3,overflow:'hidden',display:'flex'}}>
                        <div style={{width:pct(lVerified,lr.length)+'%',background:'#1a7a4a'}} title={'Verified'}/>
                        <div style={{width:pct(lDefined-lVerified-lFailed,lr.length)+'%',background:'#005EB8',opacity:.6}} title={'Activity defined'}/>
                        <div style={{width:pct(lFailed,lr.length)+'%',background:'#8b2020'}} title={'Failed'}/>
                      </div>
                    </div>
                    <span style={{fontSize:11,color:'var(--text3)',width:70,flexShrink:0}}>{lVerified}/{lr.length} verified</span>
                  </div>
                );
              })}
              <div style={{display:'flex',gap:12,marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--text2)'}}><div style={{width:10,height:10,borderRadius:2,background:'#1a7a4a'}}/>Verified</div>
                <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--text2)'}}><div style={{width:10,height:10,borderRadius:2,background:'#005EB8',opacity:.6}}/>Activity defined</div>
                <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--text2)'}}><div style={{width:10,height:10,borderRadius:2,background:'#8b2020'}}/>Failed</div>
              </div>
            </div>
          </div>
        )}

        {/* ── TAB C: TIMELINE ── */}
        {tab==='timeline'&&(
          <div>
            {filteredBaselines.length===0?(
              <div className={'empty'}><div className={'empty-icon'}>📊</div><h3>No baselines yet</h3><p>Create baselines to track evolution over time</p></div>
            ):(
              <div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,minmax(0,1fr))',gap:12,marginBottom:20}}>
                  <MetricCard label={'Baselines'} value={filteredBaselines.length} sub={'snapshots taken'}/>
                  <MetricCard label={'Req growth'} value={(function(){
                    var first=filteredBaselines[0];
                    return '+'+(total-(first.snapshot||[]).length);
                  })()} sub={'since first baseline'} color={'#1a7a4a'}/>
                  <MetricCard label={'Approval delta'} value={(function(){
                    var last=filteredBaselines[filteredBaselines.length-1];
                    var snapApproved=(last.snapshot||[]).filter(function(r){return r.status==='Approved';}).length;
                    var d=approved-snapApproved;
                    return (d>=0?'+':'')+d;
                  })()} sub={'approved since last baseline'} color={'#005EB8'}/>
                </div>

                <div className={'card'} style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:16}}>Status composition per baseline</div>
                  <div style={{overflowX:'auto'}}>
                    <div style={{minWidth:Math.max(500,(filteredBaselines.length+1)*130)+'px'}}>
                      <div style={{display:'flex',gap:8,alignItems:'flex-end',height:200,paddingBottom:24,borderBottom:'1px solid var(--border)'}}>
                        {filteredBaselines.map(function(b){
                          var snap=b.snapshot||[];
                          var bt=snap.length||1;
                          var maxH=160;
                          return (
                            <div key={b.id} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                              <div style={{width:'100%',display:'flex',flexDirection:'column-reverse',height:maxH+'px',borderRadius:'4px 4px 0 0',overflow:'hidden',cursor:'default'}} title={b.name}>
                                {STATUSES.map(function(s){
                                  var cnt=snap.filter(function(r){return r.status===s;}).length;
                                  var h=cnt/bt*maxH;
                                  if(h===0)return null;
                                  return <div key={s} style={{width:'100%',height:h+'px',background:ST_COLORS[s],flexShrink:0}}/>;
                                })}
                              </div>
                              <div style={{fontSize:10,color:'var(--text3)',textAlign:'center',width:'100%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingTop:4}}>{b.name}</div>
                              <div style={{fontSize:10,color:'var(--text3)'}}>{snap.length} reqs</div>
                            </div>
                          );
                        })}
                        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                          <div style={{width:'100%',display:'flex',flexDirection:'column-reverse',height:'160px',borderRadius:'4px 4px 0 0',overflow:'hidden',border:'2px solid var(--c1)',boxSizing:'border-box'}}>
                            {STATUSES.map(function(s){
                              var cnt=byStatus[s]||0;
                              var t2=total||1;
                              var h=cnt/t2*160;
                              if(h===0)return null;
                              return <div key={s} style={{width:'100%',height:h+'px',background:ST_COLORS[s],flexShrink:0}}/>;
                            })}
                          </div>
                          <div style={{fontSize:10,color:'var(--c1)',fontWeight:700,textAlign:'center',paddingTop:4}}>Current</div>
                          <div style={{fontSize:10,color:'var(--text3)'}}>{total} reqs</div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:10,marginTop:12}}>
                    {STATUSES.map(function(s){return (
                      <div key={s} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--text2)'}}>
                        <div style={{width:10,height:10,borderRadius:2,background:ST_COLORS[s],flexShrink:0}}/>
                        {s}
                      </div>
                    );})}
                  </div>
                </div>

                <div className={'card'}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:.4,marginBottom:14}}>Approval progress</div>
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {filteredBaselines.map(function(b){
                      var snap=b.snapshot||[];
                      var bApproved=snap.filter(function(r){return r.status==='Approved';}).length;
                      var bTotal=snap.length||1;
                      var dt=new Date(b.created_at);
                      var ds=dt.toLocaleDateString('es-ES');
                      return (
                        <div key={b.id} style={{display:'flex',alignItems:'center',gap:10}}>
                          <div style={{width:110,flexShrink:0}}>
                            <div style={{fontSize:12,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.name}</div>
                            <div style={{fontSize:10,color:'var(--text3)'}}>{ds}</div>
                          </div>
                          <div style={{flex:1,height:12,background:'var(--raised)',borderRadius:3,overflow:'hidden'}}>
                            <div style={{width:pct(bApproved,bTotal)+'%',height:'100%',background:'#1a7a4a',opacity:.7,transition:'width .3s'}}/>
                          </div>
                          <span style={{width:55,fontSize:11,color:'var(--text3)',textAlign:'right',flexShrink:0}}>{bApproved}/{bTotal} ({pct(bApproved,bTotal)}%)</span>
                        </div>
                      );
                    })}
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:110,flexShrink:0}}>
                        <div style={{fontSize:12,fontWeight:700,color:'var(--c1)'}}>Current</div>
                        <div style={{fontSize:10,color:'var(--text3)'}}>live</div>
                      </div>
                      <div style={{flex:1,height:12,background:'var(--raised)',borderRadius:3,overflow:'hidden'}}>
                        <div style={{width:pct(approved,total)+'%',height:'100%',background:'#1a7a4a',transition:'width .3s'}}/>
                      </div>
                      <span style={{width:55,fontSize:11,color:'var(--text3)',textAlign:'right',flexShrink:0}}>{approved}/{total} ({pct(approved,total)}%)</span>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

// ── RENDER ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
